<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Dashboard</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#00c853;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#00c853;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.record{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.danger{
background:red;
}

canvas{
max-height:350px;
}

#installBtn{
display:none;
}
</style>
</head>
<body>

<header>Finance Dashboard</header>

<div class="container">

<div class="card">
<h2>Add Income</h2>
<input id="incomeAmount" type="number" placeholder="Amount">
<button onclick="addIncome()">Add Income</button>

<h2>Add Expense</h2>
<input id="expenseAmount" type="number" placeholder="Amount">
<input id="expenseCategory" placeholder="Category">
<button onclick="addExpense()">Add Expense</button>

<h2>Monthly Budget</h2>
<input id="budgetInput" type="number" placeholder="Budget Limit">
<button onclick="saveBudget()">Save Budget</button>

<button id="editBtn" onclick="toggleEdit()">Edit</button>
<button onclick="downloadPDF()">Download PDF</button>
<button id="installBtn">Install App</button>
</div>

<div class="card">
<h1>Balance: KES <span id="balance">0</span></h1>
</div>

<div class="card">
<h2>Daily Trend</h2>
<canvas id="dailyChart"></canvas>
</div>

<div class="card">
<h2>Monthly Comparison</h2>
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<h2>Expense Categories</h2>
<canvas id="expenseChart"></canvas>
</div>

<div class="card">
<h2>Financial Insights</h2>
<div id="insights"></div>
</div>

<div class="card">
<h2>Records</h2>
<div id="records"></div>
</div>

</div>

<script>
let incomes=JSON.parse(localStorage.getItem("incomes"))||[];
let expenses=JSON.parse(localStorage.getItem("expenses"))||[];
let budget=Number(localStorage.getItem("budget"))||0;
let editMode=false;

let dailyChart,monthlyChart,expenseChart;

document.getElementById("budgetInput").value=budget;

function saveData(){
localStorage.setItem("incomes",JSON.stringify(incomes));
localStorage.setItem("expenses",JSON.stringify(expenses));
localStorage.setItem("budget",budget);
}

function addIncome(){
let val=Number(document.getElementById("incomeAmount").value);
if(!val)return alert("Enter amount");

incomes.push({
amount:val,
date:new Date().toISOString()
});

saveData();
updateUI();
}

function addExpense(){
let val=Number(document.getElementById("expenseAmount").value);
let cat=document.getElementById("expenseCategory").value;

if(!val||!cat)return alert("Fill all");

expenses.push({
amount:val,
category:cat,
date:new Date().toISOString()
});

saveData();
updateUI();
}

function saveBudget(){
budget=Number(document.getElementById("budgetInput").value);
saveData();
updateUI();
}

function toggleEdit(){
editMode=!editMode;
document.getElementById("editBtn").innerText=editMode?"Done":"Edit";
renderRecords();
}

function deleteExpense(i){
expenses.splice(i,1);
saveData();
updateUI();
}

function updateUI(){
let incomeTotal=incomes.reduce((a,b)=>a+b.amount,0);
let expenseTotal=expenses.reduce((a,b)=>a+b.amount,0);

document.getElementById("balance").innerText=incomeTotal-expenseTotal;

renderRecords();
drawCharts();
generateInsights();
}

function renderRecords(){
let records=document.getElementById("records");
records.innerHTML="";

expenses.forEach((e,i)=>{
records.innerHTML+=`
<div class="record">
<span>${e.category} - KES ${e.amount}</span>
${editMode?`<button class="danger" onclick="deleteExpense(${i})">Delete</button>`:""}
</div>`;
});
}

function drawCharts(){

if(dailyChart)dailyChart.destroy();
if(monthlyChart)monthlyChart.destroy();
if(expenseChart)expenseChart.destroy();

let dailyLabels=expenses.map(e=>new Date(e.date).toLocaleDateString());
let dailyData=expenses.map(e=>e.amount);

dailyChart=new Chart(document.getElementById("dailyChart"),{
type:"line",
data:{
labels:dailyLabels,
datasets:[{
label:"Daily Spending",
data:dailyData
}]
}
});

let months={};

incomes.forEach(i=>{
let d=new Date(i.date);
let k=`${d.getFullYear()}-${d.getMonth()+1}`;
months[k]=months[k]||{income:0,expense:0};
months[k].income+=i.amount;
});

expenses.forEach(e=>{
let d=new Date(e.date);
let k=`${d.getFullYear()}-${d.getMonth()+1}`;
months[k]=months[k]||{income:0,expense:0};
months[k].expense+=e.amount;
});

let labels=Object.keys(months);

monthlyChart=new Chart(document.getElementById("monthlyChart"),{
type:"bar",
data:{
labels,
datasets:[
{
label:"Income",
data:labels.map(l=>months[l].income)
},
{
label:"Expenses",
data:labels.map(l=>months[l].expense)
}
]
}
});

let catTotals={};

expenses.forEach(e=>{
catTotals[e.category]=(catTotals[e.category]||0)+e.amount;
});

expenseChart=new Chart(document.getElementById("expenseChart"),{
type:"doughnut",
data:{
labels:Object.keys(catTotals),
datasets:[{
data:Object.values(catTotals)
}]
}
});
}

function generateInsights(){

let income=incomes.reduce((a,b)=>a+b.amount,0);
let expense=expenses.reduce((a,b)=>a+b.amount,0);

let ratio=income?((expense/income)*100):0;

let status,advice;

if(ratio<=50){
status="Healthy ✅";
advice="Excellent control. Increase savings.";
}
else if(ratio<=80){
status="Moderate ⚠️";
advice="Watch discretionary spending.";
}
else{
status="Risky 🔴";
advice="Reduce expenses urgently.";
}

let budgetInsight="No budget set";

if(budget>0){
let used=(expense/budget)*100;

if(used<80)budgetInsight=`Healthy (${used.toFixed(1)}% used)`;
else if(used<=100)budgetInsight=`Warning (${used.toFixed(1)}% used)`;
else budgetInsight=`Exceeded by KES ${expense-budget}`;
}

document.getElementById("insights").innerHTML=`
<b>Total Income:</b> KES ${income}<br><br>
<b>Total Expenses:</b> KES ${expense}<br><br>
<b>Expense Ratio:</b> ${ratio.toFixed(1)}%<br><br>
<b>Status:</b> ${status}<br><br>
<b>Advice:</b> ${advice}<br><br>
<b>Budget Insight:</b> ${budgetInsight}
`;
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("Finance Report",20,20);
doc.text("Income: KES "+incomes.reduce((a,b)=>a+b.amount,0),20,40);
doc.text("Expenses: KES "+expenses.reduce((a,b)=>a+b.amount,0),20,60);

doc.save("finance-report.pdf");
}

updateUI();

/* PWA INSTALL */
let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click",()=>{
deferredPrompt.prompt();
});

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
  </html>
