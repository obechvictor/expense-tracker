<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Times New Roman';
  background: #0f172a;
  color: #fff;
  margin: 0;
}
.container { padding: 15px; }
.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 6px;
}
button {
  background: #22c55e;
  color: #fff;
  font-weight: bold;
}
canvas { margin-top: 10px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="container">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<button onclick="logout()">Logout</button>

<div class="card">
  <h3>Add Income</h3>
  <input id="incomeDesc" placeholder="Source">
  <input id="incomeAmount" type="number">
  <button onclick="addIncome()">Add Income</button>
</div>

<div class="card">
  <h3>Add Expense</h3>
  <input id="desc" placeholder="Description">
  <input id="amount" type="number">
  <select id="category">
    <option>Rent</option>
    <option>Food</option>
    <option>Water</option>
    <option>Electricity</option>
    <option>Garbage</option>
    <option>Parents</option>
    <option>Household Items</option>
    <option>Clothing</option>
    <option>Savings</option>
    <option>WiFi</option>
    <option>Miscellaneous</option>
  </select>
  <button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
  <h3>Budget</h3>
  <input id="budgetInput">
  <button onclick="setBudget()">Save Budget</button>
  <p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
  <h3>Dashboard</h3>
  <p>Income: <span id="incomeTotal">0</span></p>
  <p>Expenses: <span id="expenseTotal">0</span></p>
  <p id="profit"></p>
  <p id="budgetStatus"></p>
  <p id="health"></p>
  <p id="savingsRate"></p>
  <canvas id="categoryChart"></canvas>
</div>

<div class="card">
  <h3>Monthly Report</h3>
  <p id="monthlySummary"></p>
  <p id="monthlyComparison"></p>
  <canvas id="monthlyChart"></canvas>
</div>

<div class="card">
  <h3>Advanced Reports</h3>
  <p id="dailySummary"></p>
  <canvas id="dailyChart"></canvas>
  <canvas id="trendChart"></canvas>
</div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.appspot.com",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let categoryChart, monthlyChart, dailyChart, trendChart;
let expLoaded=false, incLoaded=false;

// AUTH
async function register(){
  let u = await auth.createUserWithEmailAndPassword(email.value,password.value);
  await db.collection("users").doc(u.user.uid).set({
    email: email.value,
    budget:0
  });
}

async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){ auth.signOut(); }

// STATE
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.style.display="none";
    app.style.display="block";
    loadData();
  } else {
    authDiv.style.display="block";
    app.style.display="none";
  }
});

// ADD DATA
function addExpense(){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").add({
    desc: desc.value,
    amount: parseFloat(amount.value),
    category: category.value,
    created: new Date()
  });
}

function addIncome(){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").add({
    desc: incomeDesc.value || "Income",
    amount: parseFloat(incomeAmount.value),
    created: new Date()
  });
}

// BUDGET
function setBudget(){
  db.collection("users").doc(auth.currentUser.uid).set({
    budget: parseFloat(budgetInput.value)
  },{merge:true});
}

// LOAD DATA
function loadData(){

  let u = auth.currentUser;
  let exp=0, inc=0, cat={}, mExp={}, mInc={};

  db.collection("users").doc(u.uid).onSnapshot(doc=>{
    budget.textContent = doc.data().budget || 0;
  });

  db.collection("users").doc(u.uid).collection("expenses")
  .onSnapshot(s=>{
    exp=0; cat={}; mExp={};

    s.forEach(d=>{
      let e=d.data();
      exp+=e.amount;
      cat[e.category]=(cat[e.category]||0)+e.amount;

      let k=e.created.toDate().toLocaleString('default',{month:'short',year:'numeric'});
      mExp[k]=(mExp[k]||0)+e.amount;
    });

    expLoaded=true;
    if(expLoaded && incLoaded) update(exp,inc,cat,mExp,mInc);
  });

  db.collection("users").doc(u.uid).collection("income")
  .onSnapshot(s=>{
    inc=0; mInc={};

    s.forEach(d=>{
      let i=d.data();
      inc+=i.amount;

      let k=i.created.toDate().toLocaleString('default',{month:'short',year:'numeric'});
      mInc[k]=(mInc[k]||0)+i.amount;
    });

    incLoaded=true;
    if(expLoaded && incLoaded) update(exp,inc,cat,mExp,mInc);
  });
}

// UPDATE UI
function update(exp,inc,cat,mExp,mInc){

  incomeTotal.textContent = inc;
  expenseTotal.textContent = exp;

  let profitVal = inc - exp;
  profit.textContent = profitVal>=0 ? "Profit: "+profitVal : "Loss: "+Math.abs(profitVal);

  let b = parseFloat(budget.textContent)||0;
  let remain = b - exp;
  budgetStatus.textContent = remain>=0 ? "Remaining: "+remain : "Overspent: "+Math.abs(remain);

  health.textContent = inc>exp ? "Healthy" : "Risk";

  let rate = inc>0 ? ((inc-exp)/inc*100).toFixed(1) : 0;
  savingsRate.textContent = "Savings Rate: "+rate+"%";

  drawCategory(cat);
  drawMonthly(mExp,mInc);
  drawDailyChart();
  drawTrend(mExp,mInc);
}

// CHARTS
function drawCategory(data){
  if(categoryChart) categoryChart.destroy();
  categoryChart = new Chart(categoryChart=document.getElementById("categoryChart"),{
    type:"pie",
    data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}
  });
}

function drawMonthly(exp,inc){
  if(monthlyChart) monthlyChart.destroy();
  let labels=[...new Set([...Object.keys(exp),...Object.keys(inc)])];

  monthlyChart = new Chart(document.getElementById("monthlyChart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"Expenses",data:labels.map(l=>exp[l]||0)},
        {label:"Income",data:labels.map(l=>inc[l]||0)}
      ]
    }
  });
}

function drawDailyChart(){
  let daily={};

  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").get().then(s=>{
    s.forEach(d=>{
      let e=d.data();
      let day=e.created.toDate().toLocaleDateString();
      daily[day]=(daily[day]||0)+e.amount;
    });

    if(dailyChart) dailyChart.destroy();

    dailyChart = new Chart(document.getElementById("dailyChart"),{
      type:"line",
      data:{
        labels:Object.keys(daily),
        datasets:[{label:"Daily Spending",data:Object.values(daily)}]
      }
    });

    dailySummary.textContent="Days tracked: "+Object.keys(daily).length;
  });
}

function drawTrend(exp,inc){
  if(trendChart) trendChart.destroy();
  let labels=[...new Set([...Object.keys(exp),...Object.keys(inc)])];

  trendChart = new Chart(document.getElementById("trendChart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {label:"Expenses",data:labels.map(l=>exp[l]||0)},
        {label:"Income",data:labels.map(l=>inc[l]||0)}
      ]
    }
  });
}

</script>

</body>
  </html>
