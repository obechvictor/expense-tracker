<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{padding:15px}
.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{background:#22c55e;color:white;font-weight:bold}
li{background:#334155;margin:5px 0;padding:8px;border-radius:6px}
canvas{margin-top:10px}
</style>
</head>

<body>

<div id="auth" class="container">
<h2>Login</h2>
<input id="email">
<input id="password" type="password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" class="container" style="display:none">

<button onclick="logout()">Logout</button>

<div class="card">
<h3>Income</h3>
<input id="incomeDesc">
<input id="incomeAmount" type="number">
<button onclick="addIncome()">Add</button>
<ul id="incomeList"></ul>
</div>

<div class="card">
<h3>Expenses</h3>
<input id="desc">
<input id="amount" type="number">
<select id="category">
<option>Rent</option><option>Food</option><option>Water</option>
<option>Electricity</option><option>WiFi</option><option>Misc</option>
</select>
<button onclick="addExpense()">Add</button>
<ul id="expenseList"></ul>
</div>

<div class="card">
<h3>Budget</h3>
<input id="budgetInput">
<button onclick="setBudget()">Save</button>
<p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Income: <span id="incomeTotal">0</span></p>
<p>Expenses: <span id="expenseTotal">0</span></p>
<p id="profit"></p>
<p id="risk"></p>
<button onclick="generatePDF()">Download PDF</button>

<canvas id="pieChart"></canvas>
<canvas id="monthlyChart"></canvas>
<canvas id="dailyChart"></canvas>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>Admin</h3>
<ul id="usersList"></ul>
</div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let pieChart, monthlyChart, dailyChart;
let mExp={}, mInc={}, dailyData={};

// AUTH
async function register(){
  let res = await auth.createUserWithEmailAndPassword(email.value,password.value);
  await db.collection("users").doc(res.user.uid).set({role:"user",budget:0});
}

async function login(){ await auth.signInWithEmailAndPassword(email.value,password.value); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    auth.style.display="none";
    app.style.display="block";
    loadData();
    checkAdmin();
  }else{
    auth.style.display="block";
    app.style.display="none";
  }
});

// ADD DATA
function addIncome(){
db.collection("users").doc(auth.currentUser.uid).collection("income").add({
desc:incomeDesc.value,amount:+incomeAmount.value,date:new Date()
});
}

function addExpense(){
db.collection("users").doc(auth.currentUser.uid).collection("expenses").add({
desc:desc.value,amount:+amount.value,category:category.value,date:new Date()
});
}

function setBudget(){
db.collection("users").doc(auth.currentUser.uid).update({budget:+budgetInput.value});
}

// LOAD DATA
function loadData(){
let uid=auth.currentUser.uid;

db.collection("users").doc(uid).onSnapshot(doc=>{
budget.innerText=doc.data().budget||0;
});

db.collection("users").doc(uid).collection("income").onSnapshot(s=>{
let total=0; mInc={}; incomeList.innerHTML="";
s.forEach(d=>{
let i=d.data(); total+=i.amount;
let m=new Date(i.date.seconds*1000).getMonth();
mInc[m]=(mInc[m]||0)+i.amount;
});
incomeTotal.innerText=total;
update();
});

db.collection("users").doc(uid).collection("expenses").onSnapshot(s=>{
let total=0,cat={}; mExp={}; dailyData={}; expenseList.innerHTML="";
s.forEach(d=>{
let e=d.data(); total+=e.amount;
cat[e.category]=(cat[e.category]||0)+e.amount;

let date=new Date(e.date.seconds*1000);
let m=date.getMonth();
let day=date.toLocaleDateString();

mExp[m]=(mExp[m]||0)+e.amount;
dailyData[day]=(dailyData[day]||0)+e.amount;
});
expenseTotal.innerText=total;
update();
drawCharts(cat);
});
}

// UPDATE
function update(){
let inc=+incomeTotal.innerText||0;
let exp=+expenseTotal.innerText||0;
let p=inc-exp;

profit.innerText=p>=0?"Profit:"+p:"Loss:"+Math.abs(p);

// RISK
let r="LOW";
if(exp>inc) r="HIGH";
else if(exp>inc*0.7) r="MEDIUM";
risk.innerText="Risk: "+r;
}

// CHARTS
function drawCharts(cat){

if(pieChart) pieChart.destroy();
pieChart=new Chart(pieChart,{
type:'pie',
data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
});

let labels=[...new Set([...Object.keys(mExp),...Object.keys(mInc)])];

if(monthlyChart) monthlyChart.destroy();
monthlyChart=new Chart(monthlyChart,{
type:'bar',
data:{labels:labels,datasets:[
{label:'Expenses',data:labels.map(l=>mExp[l]||0)},
{label:'Income',data:labels.map(l=>mInc[l]||0)}
]}
});

if(dailyChart) dailyChart.destroy();
dailyChart=new Chart(dailyChart,{
type:'line',
data:{labels:Object.keys(dailyData),
datasets:[{label:'Daily',data:Object.values(dailyData)}]}
});
}

// ADMIN
function checkAdmin(){
db.collection("users").doc(auth.currentUser.uid).get().then(doc=>{
if(doc.data().role==="admin"){
adminPanel.style.display="block";
db.collection("users").onSnapshot(s=>{
usersList.innerHTML="";
s.forEach(d=>{
usersList.innerHTML+=`<li>${d.id}
<button onclick="makeAdmin('${d.id}')">Admin</button></li>`;
});
});
}
});
}

function makeAdmin(uid){
db.collection("users").doc(uid).update({role:"admin"});
}

// PDF
async function generatePDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
let y=20;

doc.text("Finance Report",20,y); y+=10;

let snap=await db.collection("users")
.doc(auth.currentUser.uid)
.collection("expenses").get();

snap.forEach(d=>{
let e=d.data();
let date=new Date(e.date.seconds*1000).toLocaleDateString();
doc.text(`${date} - ${e.desc} - ${e.amount}`,20,y);
y+=8;
});

doc.save("report.pdf");
}

// SW
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>
</body>
  </html>
