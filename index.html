<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Dashboard Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
<style>
body{margin:0;font-family:"Times New Roman";background:#f5f7fb}
header{background:linear-gradient(135deg,#22c55e,#16a34a);padding:20px;color:#fff}
.container{padding:20px}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
button{padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.primary{background:#22c55e;color:white}
.danger{background:#ef4444;color:white}
#editBtn{float:right;background:white}
.record{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}
.metric{font-size:28px;font-weight:bold}
.hidden{display:none}
canvas{margin-top:20px}
</style>
</head>
<body>

<div id="authSection" class="container">
<div class="card">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
</div>

<div id="appSection" class="hidden">

<header>
<h2>Finance Dashboard</h2>
<button id="editBtn" onclick="toggleEdit()">Edit</button>
</header>
  
<div class="card">
<h3>Reports</h3>
<button class="primary" onclick="downloadPDF()">Download Monthly PDF</button>
</div>
  
<div class="container">

<div class="card">
<h3>Balance</h3>
<div class="metric" id="balance">KES 0</div>
</div>

<div class="card">
<h3>Add Income</h3>
<input id="incomeAmount" placeholder="Amount">
<button class="primary" onclick="addIncome()">Add Income</button>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="expenseAmount" placeholder="Amount">
<input id="expenseCategory" placeholder="Category">
<button class="primary" onclick="addExpense()">Add Expense</button>
</div>
  
<div class="card">
<h3>Monthly Budget Limit</h3>
<input type="number" id="budgetInput" placeholder="Monthly Budget">
<button onclick="saveBudget()">Save Budget</button>
<div id="budgetStatus"></div>
</div>
  
<div class="card">
<h3>Daily Spending Trend</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Monthly Comparison</h3>
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<h3>Expense Categories</h3>
<canvas id="donutChart"></canvas>
</div>

<div class="card">
<h3>Financial Insights</h3>
<div id="insights"></div>
</div>
  
<div class="card">
<h3>Records</h3>
<div id="records"></div>
</div>

</div>
</div>

<script>
  
const firebaseConfig = {
apiKey:"AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
authDomain:"expense-tracker-2ee7b.firebaseapp.com",
projectId:"expense-tracker-2ee7b",
storageBucket:"expense-tracker-2ee7b.firebasestorage.app",
messagingSenderId:"306376576940",
appId:"1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
  
let incomes=[],expenses=[],editMode=false,budget=0;
let lineChart,donutChart,monthlyChart;

function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
authSection.classList.add("hidden");
appSection.classList.remove("hidden");
loadData();
}
});

function addIncome(){
let val=Number(incomeAmount.value);
if(!val)return alert("Enter amount");

db.collection("users").doc(auth.currentUser.uid)
.collection("income").add({
amount:val,
date:new Date().toISOString()
});
}

function addExpense(){
let val=Number(expenseAmount.value);
let cat=expenseCategory.value;

if(!val||!cat)return alert("Fill all");

db.collection("users").doc(auth.currentUser.uid)
.collection("expenses").add({
amount:val,
category:cat,
date:new Date().toISOString()
});
}

function saveBudget(){

const value = Number(document.getElementById("budgetInput").value);

if(!value || value <= 0){
return alert("Enter a valid budget");
}

db.collection("users")
.doc(auth.currentUser.uid)
.set({
budget:value
},{merge:true})
.then(()=>{
alert("Budget saved");
})
.catch(err=>{
alert(err.message);
});
}
  
function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const now = new Date();

const month = now.toLocaleString("default",{month:"long"});
const year = now.getFullYear();

let incomeTotal = incomes.reduce((a,b)=>a+Number(b.amount||0),0);
let expenseTotal = expenses.reduce((a,b)=>a+Number(b.amount||0),0);
let balance = incomeTotal-expenseTotal;

doc.setFontSize(18);
doc.text("Finance Dashboard Report",20,20);

doc.setFontSize(12);
doc.text(`Month: ${month} ${year}`,20,35);

doc.text(`Total Income: KES ${incomeTotal}`,20,50);
doc.text(`Total Expenses: KES ${expenseTotal}`,20,60);
doc.text(`Balance: KES ${balance}`,20,70);

doc.text("Expenses Breakdown",20,90);

let y = 105;

expenses.forEach(e=>{
doc.text(`${e.category}: KES ${e.amount}`,20,y);
y += 10;
});

doc.save(`Finance_Report_${month}_${year}.pdf`);
}
  
function loadData(){
let uid=auth.currentUser.uid;

db.collection("users").doc(uid).collection("income")
.onSnapshot(s=>{
incomes=[];
s.forEach(d=>{
let x=d.data();x.id=d.id;x.amount=Number(x.amount||0);incomes.push(x);
});
updateUI();
generateInsights();
});

db.collection("users").doc(uid).collection("expenses")
.onSnapshot(s=>{
expenses=[];
s.forEach(d=>{
let x=d.data();x.id=d.id;x.amount=Number(x.amount||0);expenses.push(x);
});

db.collection("users")
.doc(uid)
.collection("settings")
.doc("budget")
.get()
.then(doc=>{
if(doc.exists){
budget = Number(doc.data().amount || 0);
budgetInput.value = budget;
}
});
  
updateUI();
generateInsights();
});
}

function updateUI(){
let incomeTotal=incomes.reduce((a,b)=>a+b.amount,0);
let expenseTotal=expenses.reduce((a,b)=>a+b.amount,0);

balance.innerText="KES "+(incomeTotal-expenseTotal);

renderRecords();
drawCharts();
drawMonthlyChart();
generateInsights();
}

function toggleEdit(){
editMode=!editMode;
editBtn.innerText=editMode?"Done":"Edit";
renderRecords();
}

function deleteExpense(id){
db.collection("users").doc(auth.currentUser.uid)
.collection("expenses").doc(id).delete();
}

function renderRecords(){
records.innerHTML="";
expenses.forEach(e=>{
records.innerHTML+=`
<div class="record">
<span>${e.category} - KES ${e.amount}</span>
${editMode?`<button class="danger" onclick="deleteExpense('${e.id}')">Remove</button>`:""}
</div>`;
});
}

function drawCharts(){

let daily={};

expenses.forEach(e=>{
let d=new Date(e.date);
if(isNaN(d))return;
let key=d.toISOString().split("T")[0];
daily[key]=(daily[key]||0)+e.amount;
});

let labels=Object.keys(daily).sort();
let values=labels.map(l=>daily[l]);

if(lineChart)lineChart.destroy();

lineChart=new Chart(lineChart=document.getElementById("lineChart"),{
type:"line",
data:{labels,datasets:[{label:"Daily",data:values,fill:true,tension:.4}]}
});

let cat={};

expenses.forEach(e=>{
cat[e.category]=(cat[e.category]||0)+e.amount;
});

if(donutChart)donutChart.destroy();

donutChart=new Chart(document.getElementById("donutChart"),{
type:"doughnut",
data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
});
}
  
function drawMonthlyChart(){

let mi={}, me={};

incomes.forEach(i=>{
    if(!i.date) return;

    let d = i.date?.toDate ? i.date.toDate() : new Date(i.date);
    if(isNaN(d.getTime())) return;

    let key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    mi[key]=(mi[key]||0)+Number(i.amount||0);
});

expenses.forEach(e=>{
    if(!e.date) return;

    let d = e.date?.toDate ? e.date.toDate() : new Date(e.date);
    if(isNaN(d.getTime())) return;

    let key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    me[key]=(me[key]||0)+Number(e.amount||0);
});

let labels=[...new Set([...Object.keys(mi),...Object.keys(me)])]
.sort();

if(monthlyChart) monthlyChart.destroy();

monthlyChart = new Chart(
document.getElementById("monthlyChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"Income",
data:labels.map(l=>mi[l]||0)
},
{
label:"Expenses",
data:labels.map(l=>me[l]||0)
}
]
},
options:{
responsive:true,
plugins:{
tooltip:{
callbacks:{
label:function(ctx){
return `${ctx.dataset.label}: KES ${ctx.raw}`;
}
}
}
}
}
});
  }

function generateInsights(){

const now=new Date();
let month=now.getMonth();
let year=now.getFullYear();

let monthlyIncome=0;
let monthlyExpenses=0;

incomes.forEach(i=>{
    if(!i.date) return;

    let d = i.date?.toDate ? i.date.toDate() : new Date(i.date);

    if(isNaN(d.getTime())) return;

    if(d.getMonth()===month && d.getFullYear()===year){
        monthlyIncome += Number(i.amount || 0);
    }
});
  
expenses.forEach(e=>{
    if(!e.date) return;

    let d = e.date?.toDate ? e.date.toDate() : new Date(e.date);

    if(isNaN(d.getTime())) return;

    if(d.getMonth()===month && d.getFullYear()===year){
        monthlyExpenses += Number(e.amount || 0);
    }
});
  
let ratio=monthlyIncome?monthlyExpenses/monthlyIncome*100:0;

let status,advice;
let budgetWarning="No monthly budget set. Add one above to activate budget tracking.";
  
if(ratio<=50){
status="Healthy ✅";
advice="Excellent control. Increase savings/investments.";
}
else if(ratio<=80){
status="Moderate ⚠️";
advice="Watch discretionary spending.";
}
else{
status="Risky 🔴";
advice="Reduce spending urgently and revise budget.";
}
 
if(Number(budget) > 0){

let used=(monthlyExpenses/budget)*100;

if(used>=100){
budgetWarning=`🔴 Budget exceeded by KES ${monthlyExpenses-budget}`;
}
else if(used>=80){
budgetWarning=`⚠️ You have used ${used.toFixed(1)}% of your budget`;
}
else{
budgetWarning=`✅ Budget healthy (${used.toFixed(1)}% used)`;
}
}
let used=(monthlyExpenses/budget)*100;

if(used>=100){
budgetWarning=`🔴 Budget exceeded by KES ${monthlyExpenses-budget}`;
}
else if(used>=80){
budgetWarning=`⚠️ You have used ${used.toFixed(1)}% of your budget`;
}
else{
budgetWarning=`✅ Budget healthy (${used.toFixed(1)}% used)`;
}
}

document.getElementById("insights").innerHTML = `
<b>Monthly Income:</b> KES ${monthlyIncome}<br>
This is the total income recorded this month.<br><br>

<b>Monthly Expenses:</b> KES ${monthlyExpenses}<br>
This is your total spending this month.<br><br>

<b>Expense Ratio:</b> ${ratio.toFixed(1)}%<br>
Shows how much of your income has been spent.<br><br>

<b>Status:</b> ${status}<br>
Indicates your financial health.<br><br>

<b>Advice:</b> ${advice}<br><br>

<b>Budget Insight:</b> ${budgetWarning}
`;
}
  
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
