<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Dashboard</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:"Times New Roman";
margin:0;
background:#f4f7fb;
}
header{
background:#00c853;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
}
.container{
padding:20px;
}
.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}
input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
}
button{
background:#00c853;
color:white;
border:none;
cursor:pointer;
}
button:hover{
opacity:.9;
}
.danger{
background:red;
}
.record{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}
canvas{
max-height:300px;
}
#dashboard{
display:none;
}
#installBtn{
display:none;
}
</style>
</head>
<body>

<header>Finance Dashboard</header>

<div class="container">

<div id="authCard" class="card">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="dashboard">

<div class="card">
<button onclick="logout()">Logout</button>
<button id="installBtn">Install App</button>
</div>

<div class="card">
<h2>Add Income</h2>
<input id="incomeAmount" type="number" placeholder="Amount">
<button onclick="addIncome()">Add Income</button>

<h2>Add Expense</h2>
<input id="expenseAmount" type="number" placeholder="Amount">
<input id="expenseCategory" placeholder="Category">
<button onclick="addExpense()">Add Expense</button>

<h2>Monthly Budget</h2>
<input id="budgetInput" type="number" placeholder="Budget">
<button onclick="saveBudget()">Save Budget</button>

<button id="editBtn" onclick="toggleEdit()">Edit</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="card">
<h1>Balance: KES <span id="balance">0</span></h1>
</div>

<div class="card">
<h2>Daily Trend</h2>
<canvas id="dailyChart"></canvas>
</div>

<div class="card">
<h2>Monthly Comparison</h2>
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<h2>Expense Categories</h2>
<canvas id="expenseChart"></canvas>
</div>

<div class="card">
<h2>Financial Insights</h2>
<div id="insights"></div>
</div>

<div class="card">
<h2>Records</h2>
<div id="records"></div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409",
  measurementId: "G-V7B8WSWCZ8"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let incomes=[];
let expenses=[];
let budget=0;
let editMode=false;

let dailyChart,monthlyChart,expenseChart;

// AUTH
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{
if(user){
authCard.style.display="none";
dashboard.style.display="block";
loadData();
}else{
authCard.style.display="block";
dashboard.style.display="none";
}
});

// LOAD
function loadData(){
const uid=auth.currentUser.uid;

db.collection("users")
.doc(uid)
.get()
.then(doc=>{

if(doc.exists){

let data=doc.data();

if(data.budgetMonth===getCurrentMonthKey()){
budget=Number(data.budget||0);
budgetInput.value=budget;
}else{
budget=0;
budgetInput.value="";
}
}

updateUI();
});

db.collection("users").doc(uid)
.collection("income")
.onSnapshot(s=>{
incomes=[];
s.forEach(d=>incomes.push({...d.data(),id:d.id}));
updateUI();
});

db.collection("users").doc(uid)
.collection("expenses")
.onSnapshot(s=>{
expenses=[];
s.forEach(d=>expenses.push({...d.data(),id:d.id}));
updateUI();
});
}

// ADD
function addIncome(){
let val=Number(incomeAmount.value);
if(!val)return;

db.collection("users").doc(auth.currentUser.uid)
.collection("income")
.add({
amount:val,
date:new Date().toISOString()
});
}

function addExpense(){
let val=Number(expenseAmount.value);
let cat=expenseCategory.value;
if(!val||!cat)return;

db.collection("users").doc(auth.currentUser.uid)
.collection("expenses")
.add({
amount:val,
category:cat,
date:new Date().toISOString()
});
}
  
function saveBudget(){

let value=Number(budgetInput.value);

if(!value || value<=0){
alert("Enter valid budget");
return;
}

db.collection("users")
.doc(auth.currentUser.uid)
.set({
budget:value,
budgetMonth:getCurrentMonthKey()
},{merge:true})
.then(()=>{
budget=value;
generateInsights();
alert("Budget saved");
});
}
  
function getCurrentMonthKey(){
let now=new Date();
return `${now.getFullYear()}-${now.getMonth()+1}`;
}
  
// EDIT
function toggleEdit(){
editMode=!editMode;
editBtn.innerText=editMode?"Done":"Edit";
renderRecords();
}

function deleteExpense(id){
db.collection("users")
.doc(auth.currentUser.uid)
.collection("expenses")
.doc(id)
.delete();
}

// UI
function updateUI(){

const now = new Date();

let income = incomes
.filter(i=>{
let d=new Date(i.date);
return d.getMonth()===now.getMonth() &&
d.getFullYear()===now.getFullYear();
})
.reduce((a,b)=>a+b.amount,0);

let expense = expenses
.filter(e=>{
let d=new Date(e.date);
return d.getMonth()===now.getMonth() &&
d.getFullYear()===now.getFullYear();
})
.reduce((a,b)=>a+b.amount,0);

balance.innerText = "KES " + (income - expense);

renderRecords();
drawCharts();
generateInsights();
}
  
function renderRecords(){

records.innerHTML="";

const now = new Date();

const currentExpenses = expenses.filter(e=>{
let d=new Date(e.date);

return d.getMonth()===now.getMonth() &&
d.getFullYear()===now.getFullYear();
});

currentExpenses.forEach(e=>{

records.innerHTML += `
<div class="record">
<span>${e.category} - KES ${e.amount}</span>

${editMode
? `<button class="danger"
onclick="deleteExpense('${e.id}')">Delete</button>`
: ""}
</div>
`;

});
}

// CHARTS
function drawCharts(){

if(dailyChart)dailyChart.destroy();
if(monthlyChart)monthlyChart.destroy();
if(expenseChart)expenseChart.destroy();

dailyChart=new Chart(dailyChart=document.getElementById("dailyChart"),{
type:"line",
data:{
labels:expenses.map(e=>new Date(e.date).toLocaleDateString()),
datasets:[{
label:"Daily Spending",
data:expenses.map(e=>e.amount)
}]
}
});

let months={};

incomes.forEach(i=>{
let d=new Date(i.date);
let k=`${d.getFullYear()}-${d.getMonth()+1}`;
months[k]=months[k]||{income:0,expense:0};
months[k].income+=i.amount;
});

expenses.forEach(e=>{
let d=new Date(e.date);
let k=`${d.getFullYear()}-${d.getMonth()+1}`;
months[k]=months[k]||{income:0,expense:0};
months[k].expense+=e.amount;
});

let labels=Object.keys(months);

monthlyChart=new Chart(document.getElementById("monthlyChart"),{
type:"bar",
data:{
labels,
datasets:[
{label:"Income",data:labels.map(l=>months[l].income)},
{label:"Expenses",data:labels.map(l=>months[l].expense)}
]
}
});

let cats={};
expenses.forEach(e=>{
cats[e.category]=(cats[e.category]||0)+e.amount;
});

expenseChart=new Chart(document.getElementById("expenseChart"),{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{data:Object.values(cats)}]
}
});
}

// INSIGHTS
function generateInsights(){
let now=new Date();

let income=incomes
.filter(i=>{
let d=new Date(i.date);
return d.getMonth()===now.getMonth() &&
d.getFullYear()===now.getFullYear();
})
.reduce((a,b)=>a+b.amount,0);
let expense=expenses
.filter(e=>{
let d=new Date(e.date);
return d.getMonth()===now.getMonth() &&
d.getFullYear()===now.getFullYear();
})
.reduce((a,b)=>a+b.amount,0);

let ratio=income?expense/income*100:0;

let status=
ratio<=50?"Healthy ✅":
ratio<=80?"Moderate ⚠️":
"Risky 🔴";

let budgetInsight="No budget set";

if(budget>0){
let used=expense/budget*100;

budgetInsight=
used<80?`Healthy (${used.toFixed(1)}%)`:
used<=100?`Warning (${used.toFixed(1)}%)`:
`Exceeded by KES ${expense-budget}`;
}

insights.innerHTML=`
Income: KES ${income}<br><br>
Expenses: KES ${expense}<br><br>
Ratio: ${ratio.toFixed(1)}%<br><br>
Status: ${status}<br><br>
Budget: ${budgetInsight}
`;
}

// PDF
function downloadPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("Finance Report",20,20);
doc.text(insights.innerText,20,40);

doc.save("finance-report.pdf");
}

// PWA
let deferredPrompt;

window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

installBtn.addEventListener("click",()=>{
deferredPrompt.prompt();
});

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
