<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance SaaS</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:#fff; }
.container { padding:15px; }
.card { background:#1e293b; padding:15px; margin-bottom:15px; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:6px; }
button { background:#22c55e; color:#fff; font-weight:bold; }
ul { list-style:none; padding:0; }
li { background:#334155; padding:10px; margin:5px 0; border-radius:6px; display:flex; justify-content:space-between; }
table { width:100%; border-collapse: collapse; }
th, td { padding:10px; border-bottom:1px solid #334155; }
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="container">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<button onclick="logout()">Logout</button>

<div class="card">
  <h3>Add Expense</h3>
  <input id="desc" placeholder="Description">
  <input id="amount" type="number" placeholder="Amount">
  <select id="category">
    <option>Food</option>
    <option>Transport</option>
    <option>Bills</option>
    <option>Other</option>
  </select>
  <button onclick="addExpense()">Add</button>
</div>

<div class="card">
  <h3>Budget</h3>
  <input id="budgetInput" placeholder="Budget">
  <button onclick="setBudget()">Save</button>
  <p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
  <h3>Analytics</h3>
  <p>Total: <span id="total">0</span></p>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>Expenses</h3>
  <ul id="list"></ul>
</div>

<!-- ADMIN PANEL -->
<div class="card" id="adminPanel" style="display:none; border:2px solid #22c55e;">
  <h2>⚙️ Admin Dashboard</h2>
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="usersList"></tbody>
  </table>
</div>

</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let chart;

/* REGISTER */
async function register(){
  try{
    const userCred = await auth.createUserWithEmailAndPassword(email.value, password.value);

    await db.collection("users").doc(userCred.user.uid).set({
      email: email.value,
      role: "admin",
      budget: 0
    });

    alert("Registered!");
  }catch(e){ alert(e.message); }
}

/* LOGIN */
async function login(){
  try{
    await auth.signInWithEmailAndPassword(email.value, password.value);
  }catch(e){ alert(e.message); }
}

function logout(){ auth.signOut(); }

/* AUTH STATE */
auth.onAuthStateChanged(async user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    const ref = db.collection("users").doc(user.uid);
    const doc = await ref.get();

    if(!doc.exists){
      await ref.set({
        email: user.email,
        role: "admin",
        budget: 0
      });
    }

    loadData();
    loadAdmin();

  } else {
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

/* ADD EXPENSE */
async function addExpense(){
  const user = auth.currentUser;

  await db.collection("users").doc(user.uid)
  .collection("expenses").add({
    desc: desc.value,
    amount: +amount.value,
    category: category.value,
    created: new Date()
  });

  desc.value = "";
  amount.value = "";
}

/* DELETE EXPENSE */
async function deleteExpense(id){
  const user = auth.currentUser;

  await db.collection("users").doc(user.uid)
  .collection("expenses").doc(id).delete();
}

/* BUDGET */
async function setBudget(){
  const user = auth.currentUser;

  await db.collection("users").doc(user.uid)
  .set({ budget: +budgetInput.value }, { merge:true });
}

/* LOAD DATA */
function loadData(){
  const user = auth.currentUser;

  db.collection("users").doc(user.uid)
  .onSnapshot(doc=>{
    const d = doc.data() || {};
    budget.textContent = d.budget || 0;
  });

  db.collection("users").doc(user.uid)
  .collection("expenses")
  .onSnapshot(snapshot=>{

    let total = 0;
    let categories = {};
    list.innerHTML = "";

    snapshot.forEach(doc=>{
      let e = doc.data();
      total += e.amount;

      categories[e.category] = (categories[e.category] || 0) + e.amount;

      let li = document.createElement("li");
      li.innerHTML = `
        ${e.desc} - ${e.amount} (${e.category})
        <button onclick="deleteExpense('${doc.id}')">X</button>
      `;
      list.appendChild(li);
    });

    totalEl = document.getElementById("total");
    totalEl.textContent = total;

    drawChart(categories);
  });
}

/* CHART */
function drawChart(data){
  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"pie",
    data:{
      labels:Object.keys(data),
      datasets:[{ data:Object.values(data) }]
    }
  });
}

/* ADMIN PANEL */
function loadAdmin(){
  const user = auth.currentUser;

  if(!user) return;

  db.collection("users").doc(user.uid).get().then(doc=>{
    const data = doc.data();

    console.log("ADMIN CHECK:", data);

    if(data && data.role === "admin"){
      document.getElementById("adminPanel").style.display = "block";

      db.collection("users").onSnapshot(snapshot=>{
        usersList.innerHTML = "";

        snapshot.forEach(d=>{
          let userData = d.data();

          let row = document.createElement("tr");
          row.innerHTML = `
          <td>${userData.email || d.id}</td>
          <td>${userData.role}</td>
          <td>
          <button onclick="makeAdmin('${d.id}')">Make Admin</button>
          <button onclick="deleteUser('${d.id}')">Delete</button>
          </td>
          `;

          usersList.appendChild(row);
        });
      });
    }
  });
}
/* ADMIN ACTIONS */
async function makeAdmin(uid){
  await db.collection("users").doc(uid).update({
    role: "admin"
  });
}

async function deleteUser(uid){
  await db.collection("users").doc(uid).delete();
}
</script>

</body>
</html>
