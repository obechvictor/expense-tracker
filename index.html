<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Dashboard Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

header{
background:linear-gradient(135deg,#22c55e,#16a34a);
padding:20px;
color:white;
border-radius:0 0 20px 20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#22c55e;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

#editBtn{
float:right;
background:white;
color:#111;
}

.record{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
align-items:center;
}

.metric{
font-size:28px;
font-weight:bold;
}

.hidden{
display:none;
}

#insights{
line-height:1.8;
}

canvas{
margin-top:20px;
}
</style>
</head>
<body>

<div id="authSection" class="container">
<div class="card">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
</div>

<div id="appSection" class="hidden">

<header>
<h2>Finance Dashboard</h2>
<button id="editBtn" onclick="toggleEdit()">Edit</button>
</header>

<div class="container">

<div class="card">
<h3>Balance</h3>
<div class="metric" id="balance">KES 0</div>
</div>

<div class="card">
<h3>Add Income</h3>
<input id="incomeAmount" placeholder="Amount">
<button class="primary" onclick="addIncome()">Add Income</button>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="expenseAmount" placeholder="Amount">
<input id="expenseCategory" placeholder="Category">
<button class="primary" onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3>Daily Trend</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Expense Categories</h3>
<canvas id="donutChart"></canvas>
</div>

<div class="card">
<h3>Insights</h3>
<div id="insights">No data yet</div>
</div>

<div class="card">
<h3>Records</h3>
<div id="records"></div>
</div>

</div>
</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
authDomain:"expense-tracker-2ee7b.firebaseapp.com",
projectId:"expense-tracker-2ee7b",
storageBucket:"expense-tracker-2ee7b.firebasestorage.app",
messagingSenderId:"306376576940",
appId:"1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let incomes=[];
let expenses=[];
let editMode=false;
let lineChart;
let donutChart;

function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
authSection.classList.add("hidden");
appSection.classList.remove("hidden");
loadData();
}
});

function addIncome(){
let val=Number(incomeAmount.value);
if(!val)return alert("Enter amount");

db.collection("users").doc(auth.currentUser.uid)
.collection("income").add({
amount:val,
date:new Date().toISOString()
});
}

function addExpense(){
let val=Number(expenseAmount.value);
let cat=expenseCategory.value;

if(!val||!cat)return alert("Fill all fields");

db.collection("users").doc(auth.currentUser.uid)
.collection("expenses").add({
amount:val,
category:cat,
date:new Date().toISOString()
});
}

function loadData(){

let uid=auth.currentUser.uid;

db.collection("users").doc(uid)
.collection("income")
.onSnapshot(snap=>{
incomes=[];
snap.forEach(d=>{
let i=d.data();
i.id=d.id;
i.amount=Number(i.amount||0);
incomes.push(i);
});
updateUI();
});

db.collection("users").doc(uid)
.collection("expenses")
.onSnapshot(snap=>{
expenses=[];
snap.forEach(d=>{
let e=d.data();
e.id=d.id;
e.amount=Number(e.amount||0);
expenses.push(e);
});
updateUI();
});
}

function updateUI(){

let incomeTotal=incomes.reduce((a,b)=>a+b.amount,0);
let expenseTotal=expenses.reduce((a,b)=>a+b.amount,0);

balance.innerText="KES "+(incomeTotal-expenseTotal);

renderRecords();
drawCharts();
generateInsights();
}

function toggleEdit(){

editMode=!editMode;

if(editMode){
editBtn.innerText="Done";
editBtn.style.background="#ef4444";
editBtn.style.color="white";
}else{
editBtn.innerText="Edit";
editBtn.style.background="white";
editBtn.style.color="black";
}

renderRecords();
}

function deleteExpense(id){
db.collection("users").doc(auth.currentUser.uid)
.collection("expenses").doc(id).delete();
}

function renderRecords(){

records.innerHTML="";

expenses.forEach(e=>{

records.innerHTML+=`
<div class="record">
<span>${e.category} - KES ${e.amount}</span>
${editMode?`<button class="danger" onclick="deleteExpense('${e.id}')">Remove</button>`:""}
</div>
`;

});
}

function drawCharts(){

let daily={};

expenses.forEach(e=>{
if(!e.date)return;

let d=new Date(e.date);
if(isNaN(d))return;

let key=d.toISOString().split("T")[0];
daily[key]=(daily[key]||0)+e.amount;
});

let labels=Object.keys(daily).sort();
let values=labels.map(l=>daily[l]);

if(lineChart)lineChart.destroy();

lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Daily Spending",
data:values,
fill:true,
tension:.4
}]
}
});

let cat={};

expenses.forEach(e=>{
cat[e.category]=(cat[e.category]||0)+e.amount;
});

if(donutChart)donutChart.destroy();

donutChart=new Chart(document.getElementById("donutChart"),{
type:"doughnut",
data:{
labels:Object.keys(cat),
datasets:[{
data:Object.values(cat)
}]
}
});
}

function generateInsights(){

if(!expenses.length){
insights.innerHTML="No data yet";
return;
}

let total=expenses.reduce((a,b)=>a+b.amount,0);
let avg=Math.round(total/expenses.length);

insights.innerHTML=`
<b>Total Expenses:</b> KES ${total}<br>
<b>Average Transaction:</b> KES ${avg}<br>
<b>Transactions:</b> ${expenses.length}
`;
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
