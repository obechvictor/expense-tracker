<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Smart Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:#f5f7fb;color:#222;padding:12px}.card,.header{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 4px 10px rgba(0,0,0,.08)}.header{background:#16c94c;color:#fff;display:flex;justify-content:space-between}.btn{background:#16c94c;color:#fff;border:none;padding:10px;border-radius:8px;width:100%;margin:6px 0}.small{width:auto;padding:6px 12px;background:#fff;color:#16c94c}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.hidden{display:none}input,select{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px}.insight-good{color:#16c94c}.insight-bad{color:#ef4444}
</style>
</head>
<body>
<div id="auth" class="card"><h2>Expense Tracker</h2><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button class="btn" onclick="register()">Register</button><button class="btn" onclick="login()">Login</button></div>
<div id="dash" class="hidden">
<div class="header"><h2>Finance Dashboard</h2><button class="small" onclick="toggleEdit()" id="editBtn">Edit</button></div>
<div class="grid"><div class="card"><h3>Income</h3><p id="income">0</p></div><div class="card"><h3>Expenses</h3><p id="expenses">0</p></div><div class="card"><h3>Balance</h3><p id="balance">0</p></div></div>
<div class="card"><h3>Budget</h3><input id="budget"><button class="btn" onclick="setBudget()">Set Budget</button><p id="budgetStatus"></p></div>
<div class="card"><h3>Add Transaction</h3><input id="amount"><select id="type"><option>income</option><option>expense</option></select><input id="category"><button class="btn" onclick="addTransaction()">Add</button></div>
<div class="card"><canvas id="daily"></canvas></div>
<div class="card"><canvas id="donut"></canvas></div>
<div class="card"><h3>Financial Insights</h3><div id="insights"></div></div>
<div class="card"><div id="list"></div></div>
</div>
<script>
let transactions=[],budget=0,edit=false;
function register(){localStorage.setItem('user',email.value);login()}
function login(){if(email.value){localStorage.setItem('user',email.value);auth.classList.add('hidden');dash.classList.remove('hidden');load()}}
function load(){transactions=JSON.parse(localStorage.getItem(localStorage.getItem('user')+'_tx')||'[]');budget=+localStorage.getItem(localStorage.getItem('user')+'_budget')||0;render()}
function save(){localStorage.setItem(localStorage.getItem('user')+'_tx',JSON.stringify(transactions));localStorage.setItem(localStorage.getItem('user')+'_budget',budget)}
function addTransaction(){transactions.push({amount:+amount.value,type:type.value,category:category.value,date:new Date().toISOString()});save();render()}
function setBudget(){budget=+document.getElementById('budget').value;save();render()}
function toggleEdit(){edit=!edit;editBtn.innerText=edit?'Done':'Edit';render()}
function del(i){transactions.splice(i,1);save();render()}
let dailyChart,monthlyChart;
function drawCharts(){const d={};transactions.filter(t=>t.type=='expense').forEach(t=>{const x=t.date.split('T')[0];d[x]=(d[x]||0)+t.amount});const labels=Object.keys(d).sort();const vals=labels.map(x=>d[x]);if(dailyChart)dailyChart.destroy();dailyChart=new Chart(document.getElementById('daily'),{type:'line',data:{labels:labels,datasets:[{label:'Daily Expenses',data:vals}]}});const inc=transactions.filter(t=>t.type=='income').reduce((a,b)=>a+b.amount,0),exp=transactions.filter(t=>t.type=='expense').reduce((a,b)=>a+b.amount,0);if(monthlyChart)monthlyChart.destroy();monthlyChart=new Chart(document.getElementById('donut'),{type:'bar',data:{labels:['This Month'],datasets:[{label:'Income',data:[inc]},{label:'Expense',data:[exp]}]}})}
function render(){let inc=transactions.filter(t=>t.type=='income').reduce((a,b)=>a+b.amount,0),exp=transactions.filter(t=>t.type=='expense').reduce((a,b)=>a+b.amount,0);income.innerText='KSh '+inc;expenses.innerText='KSh '+exp;balance.innerText='KSh '+(inc-exp);budgetStatus.innerText=budget?('Remaining: '+(budget-exp)):'No budget set';insights.innerHTML='<p class='+(exp>budget?'"insight-bad"':'"insight-good"')+'>'+((exp>budget)?'Over budget':'Healthy spending')+'</p>';list.innerHTML=transactions.map((t,i)=>`<p>${t.category} KSh ${t.amount} ${edit?'<button onclick=del('+i+')>X</button>':''}</p>`).join('');drawCharts();}
if(localStorage.getItem('user')){auth.classList.add('hidden');dash.classList.remove('hidden');load()}
</script>
</body>
</html>
