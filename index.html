<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:"Times New Roman";
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.dashboard-header{
background:#00c853;
color:white;
padding:18px 20px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

#editBtn{
width:auto !important;
padding:8px 16px;
background:white;
color:#00c853;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin:10px 0;
background:#00c853;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.record{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>
<body>

<div class="container">

<div id="authCard" class="card">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="dashboard">

<div class="dashboard-header">
<h1>Finance Dashboard</h1>
<button id="editBtn" onclick="toggleEdit()">Edit</button>
</div>

<div class="card">
<button onclick="logout()">Logout</button>
<button id="installBtn">Install App</button>
</div>

<div class="card">
<h2>Add Income</h2>
<input id="incomeAmount" type="number" placeholder="Amount">
<button onclick="addIncome()">Add Income</button>

<h2>Add Expense</h2>
<input id="expenseAmount" type="number" placeholder="Amount">
<input id="expenseCategory" placeholder="Category">
<button onclick="addExpense()">Add Expense</button>

<h2>Monthly Budget</h2>
<input id="budgetInput" type="number" placeholder="Budget" disabled>
<button onclick="saveBudget()">Save Budget</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="card">
<h1>Balance: KES <span id="balance">0</span></h1>
</div>

<div class="card">
<h2>Daily Trend</h2>
<canvas id="dailyChart"></canvas>
</div>

<div class="card">
<h2>Monthly Comparison</h2>
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<h2>Expense Categories</h2>
<canvas id="expenseChart"></canvas>
</div>

<div class="card">
<h2>Financial Insights</h2>
<div id="insights"></div>
</div>

<div class="card">
<h2>Records</h2>
<div id="records"></div>
</div>

</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
authDomain:"expense-tracker-2ee7b.firebaseapp.com",
projectId:"expense-tracker-2ee7b",
storageBucket:"expense-tracker-2ee7b.firebasestorage.app",
messagingSenderId:"306376576940",
appId:"1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

const email=document.getElementById("email");
const password=document.getElementById("password");
const authCard=document.getElementById("authCard");
const dashboard=document.getElementById("dashboard");
const incomeAmount=document.getElementById("incomeAmount");
const expenseAmount=document.getElementById("expenseAmount");
const expenseCategory=document.getElementById("expenseCategory");
const budgetInput=document.getElementById("budgetInput");
const balance=document.getElementById("balance");
const insights=document.getElementById("insights");
const records=document.getElementById("records");
const editBtn=document.getElementById("editBtn");

dashboard.style.display="none";

let incomes=[];
let expenses=[];
let budget=0;
let editMode=false;

function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{
if(user){
authCard.style.display="none";
dashboard.style.display="block";
loadData();
}else{
authCard.style.display="block";
dashboard.style.display="none";
}
});

function toggleEdit(){
editMode=!editMode;
budgetInput.disabled=!editMode;
editBtn.innerText=editMode?"Done":"Edit";
}

async function loadData(){
const uid=auth.currentUser.uid;

const doc=await db.collection("users").doc(uid).get();
if(doc.exists) budget=doc.data().budget||0;
budgetInput.value=budget;

const incomeSnap=await db.collection("users").doc(uid).collection("income").get();
incomes=incomeSnap.docs.map(d=>d.data());

const expenseSnap=await db.collection("users").doc(uid).collection("expenses").get();
expenses=expenseSnap.docs.map(d=>d.data());

updateUI();
}

async function saveBudget(){
budget=Number(budgetInput.value);
await db.collection("users").doc(auth.currentUser.uid).set({budget});
}

async function addIncome(){
const amount=Number(incomeAmount.value);
await db.collection("users").doc(auth.currentUser.uid).collection("income").add({
amount,date:new Date().toISOString()
});
loadData();
}

async function addExpense(){
const amount=Number(expenseAmount.value);
const category=expenseCategory.value;

await db.collection("users").doc(auth.currentUser.uid).collection("expenses").add({
amount,category,date:new Date().toISOString()
});
loadData();
}

function updateUI(){
let income=incomes.reduce((a,b)=>a+b.amount,0);
let expense=expenses.reduce((a,b)=>a+b.amount,0);

balance.innerText=(income-expense).toLocaleString();

records.innerHTML="";

let grouped={};

expenses.forEach(e=>{
grouped[e.category]=(grouped[e.category]||0)+e.amount;
});

for(let cat in grouped){
records.innerHTML+=`<div class="record">${cat} - KES ${grouped[cat]}</div>`;
}
    
drawCharts();
generateInsights(income,expense);
renderRecords();
}

function generateInsights(income,expense){

let ratio = income ? (expense/income)*100 : 0;

let status =
ratio <= 50 ? "Healthy ✅" :
ratio <= 80 ? "Moderate ⚠️" :
"Risky 🔴";

let budgetInsight = "No budget set";

if(budget > 0){
let used = (expense/budget)*100;

budgetInsight =
used <= 80 ? `Healthy (${used.toFixed(1)}%)` :
used <= 100 ? `Warning (${used.toFixed(1)}%)` :
`Exceeded by KES ${(expense-budget).toLocaleString()}`;
}

let savings = income - expense;

let savingsRate = income ? ((savings/income)*100).toFixed(1) : 0;

let recommendation =
ratio <= 50 ? "Your spending is under control. Keep saving." :
ratio <= 80 ? "Watch your spending closely this month." :
"Urgent review needed. Expenses are too high.";

let topCategory = "None";

if(expenses.length){
let cats = {};

expenses.forEach(e=>{
cats[e.category]=(cats[e.category]||0)+e.amount;
});

topCategory = Object.entries(cats)
.sort((a,b)=>b[1]-a[1])[0][0];
}

insights.innerHTML = `
<b>Total Income:</b> KES ${income.toLocaleString()}<br><br>

<b>Total Expenses:</b> KES ${expense.toLocaleString()}<br><br>

<b>Balance:</b> KES ${(income-expense).toLocaleString()}<br><br>

<b>Expense Ratio:</b> ${ratio.toFixed(1)}%<br><br>

<b>Status:</b> ${status}<br><br>

<b>Savings Rate:</b> ${savingsRate}%<br><br>

<b>Budget Analysis:</b> ${budgetInsight}<br><br>

<b>Highest Spending Category:</b> ${topCategory}<br><br>

<b>Recommendation:</b> ${recommendation}
`;
    }

function drawCharts() {

    if (dailyChart) dailyChart.destroy();
    if (monthlyChart) monthlyChart.destroy();
    if (expenseChart) expenseChart.destroy();

    const sortedExpenses = [...expenses].sort(
        (a,b)=>new Date(a.date)-new Date(b.date)
    );

    const incomeTotal = incomes.reduce((a,b)=>a+b.amount,0);
    const expenseTotal = expenses.reduce((a,b)=>a+b.amount,0);

    // DAILY TREND
    dailyChart = new Chart(
        document.getElementById("dailyChart"),
        {
            type:"line",
            data:{
                labels: sortedExpenses.map(e =>
                    new Date(e.date).toLocaleDateString("en-GB",{
                        day:"numeric",
                        month:"short"
                    })
                ),
                datasets:[{
                    label:"Daily Spending",
                    data: sortedExpenses.map(e=>e.amount),
                    borderColor:"blue",
                    backgroundColor:"rgba(0,0,255,0.1)",
                    fill:true,
                    tension:0.3
                }]
            },
            options:{
                responsive:true,
                plugins:{
                    legend:{display:true}
                }
            }
        }
    );

    // MONTHLY COMPARISON
    monthlyChart = new Chart(
        document.getElementById("monthlyChart"),
        {
            type:"bar",
            data:{
                labels:["Income","Expenses"],
                datasets:[{
                    label:"Current Month",
                    data:[incomeTotal,expenseTotal],
                    backgroundColor:["green","red"]
                }]
            },
            options:{
                responsive:true
            }
        }
    );

    // EXPENSE CATEGORY CHART
    let categories = {};

    expenses.forEach(e=>{
        categories[e.category] =
            (categories[e.category] || 0) + e.amount;
    });

    expenseChart = new Chart(
        document.getElementById("expenseChart"),
        {
            type:"doughnut",
            data:{
                labels:Object.keys(categories),
                datasets:[{
                    data:Object.values(categories)
                }]
            },
            options:{
                responsive:true
            }
        }
    );
    }
function downloadPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();

doc.text("Finance Report",20,20);
doc.text(insights.innerText,20,40);

doc.save("report.pdf");
}
</script>

</body>
</html>
