<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; }
.container { padding:15px; }
.card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; border-radius:6px; border:none; }
button { background:#22c55e; color:white; font-weight:bold; }
li { background:#334155; margin:5px 0; padding:8px; border-radius:6px; }
</style>

</head>

<body>

<!-- AUTH -->
<div id="auth" class="container">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none">

<button onclick="logout()">Logout</button>

<div class="card">
<h3>Income</h3>
<input id="incomeDesc" placeholder="Source">
<input id="incomeAmount" type="number">
<button onclick="addIncome()">Add</button>
<ul id="incomeList"></ul>
</div>

<div class="card">
<h3>Expense</h3>
<input id="desc" placeholder="Description">
<input id="amount" type="number">
<select id="category">
<option>Rent</option>
<option>Food</option>
<option>Water</option>
<option>Electricity</option>
<option>Garbage</option>
<option>Parents</option>
<option>Household</option>
<option>Clothing</option>
<option>Savings</option>
<option>WiFi</option>
<option>Misc</option>
</select>
<button onclick="addExpense()">Add</button>
<ul id="expenseList"></ul>
</div>

<div class="card">
<h3>Budget</h3>
<input id="budgetInput">
<button onclick="setBudget()">Save</button>
<p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Income: <span id="incomeTotal">0</span></p>
<p>Expenses: <span id="expenseTotal">0</span></p>
<p id="profit"></p>
<p id="status"></p>
</div>

<div class="card">
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<canvas id="lineChart"></canvas>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>Admin Panel</h3>
<ul id="usersList"></ul>
</div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let pieChart, lineChart;

// AUTH
async function register(){
  let res = await auth.createUserWithEmailAndPassword(email.value, password.value);
  await db.collection("users").doc(res.user.uid).set({
    budget:0,
    role:"user"
  });
}

async function login(){
  await auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout(){ auth.signOut(); }

// STATE
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv(false);
    loadData();
    loadAdmin();
  }else{
    authDiv(true);
  }
});

function authDiv(show){
  document.getElementById("auth").style.display = show ? "block":"none";
  document.getElementById("app").style.display = show ? "none":"block";
}

// DATA
function addIncome(){
  db.collection("users").doc(auth.currentUser.uid).collection("income").add({
    desc: incomeDesc.value,
    amount: +incomeAmount.value,
    date: new Date()
  });
}

function addExpense(){
  db.collection("users").doc(auth.currentUser.uid).collection("expenses").add({
    desc: desc.value,
    amount: +amount.value,
    category: category.value,
    date: new Date()
  });
}

function setBudget(){
  db.collection("users").doc(auth.currentUser.uid).update({
    budget:+budgetInput.value
  });
}

// LOAD
function loadData(){
  let uid = auth.currentUser.uid;

  db.collection("users").doc(uid).onSnapshot(doc=>{
    budget.innerText = doc.data().budget || 0;
  });

  db.collection("users").doc(uid).collection("income")
  .onSnapshot(s=>{
    let total=0; incomeList.innerHTML="";
    s.forEach(d=>{
      total+=d.data().amount;
      incomeList.innerHTML+=`<li>${d.data().desc} - ${d.data().amount}
      <button onclick="del('income','${d.id}')">x</button></li>`;
    });
    incomeTotal.innerText=total;
    update();
  });

  db.collection("users").doc(uid).collection("expenses")
  .onSnapshot(s=>{
    let total=0, cat={}, daily={};
    expenseList.innerHTML="";

    s.forEach(d=>{
      let x=d.data();
      total+=x.amount;

      cat[x.category]=(cat[x.category]||0)+x.amount;

      let day=new Date(x.date.seconds*1000).toLocaleDateString();
      daily[day]=(daily[day]||0)+x.amount;

      expenseList.innerHTML+=`<li>${x.desc}-${x.amount} (${x.category})
      <button onclick="del('expenses','${d.id}')">x</button></li>`;
    });

    expenseTotal.innerText=total;
    update();
    drawCharts(cat,daily);
  });
}

// DELETE
function del(col,id){
  db.collection("users").doc(auth.currentUser.uid)
    .collection(col).doc(id).delete();
}

// CALC
function update(){
  let inc=+incomeTotal.innerText||0;
  let exp=+expenseTotal.innerText||0;
  let bud=+budget.innerText||0;

  let p=inc-exp;

  profit.innerText=p>=0?"Profit: "+p:"Loss: "+Math.abs(p);

  let remain=bud-exp;
  status.innerText=remain<0?"⚠ Over Budget":"Safe";
}

// CHARTS
function drawCharts(cat,daily){

  if(pieChart) pieChart.destroy();
  pieChart=new Chart(pieChartCtx(),{
    type:'pie',
    data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
  });

  if(lineChart) lineChart.destroy();
  lineChart=new Chart(lineChartCtx(),{
    type:'line',
    data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily)}]}
  });
}

function pieChartCtx(){ return document.getElementById('pieChart'); }
function lineChartCtx(){ return document.getElementById('lineChart'); }

// ADMIN
function loadAdmin(){
  let uid=auth.currentUser.uid;

  db.collection("users").doc(uid).get().then(doc=>{
    if(doc.data().role==="admin"){
      adminPanel.style.display="block";

      db.collection("users").onSnapshot(s=>{
        usersList.innerHTML="";
        s.forEach(d=>{
          usersList.innerHTML+=`<li>${d.id} (${d.data().role})
          <button onclick="makeAdmin('${d.id}')">Admin</button></li>`;
        });
      });
    }
  });
}

function makeAdmin(uid){
  db.collection("users").doc(uid).update({role:"admin"});
}

</script>

</body>
</html>
