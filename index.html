<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Finance Pro SaaS</title>

<link rel="manifest" href="manifest.json">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Times New Roman;background:#0f172a;color:#fff;margin:0}
.container{padding:15px}
.card{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px}
button{background:#22c55e;color:#fff;font-weight:bold}
ul{list-style:none;padding:0}
li{background:#334155;margin:5px 0;padding:8px;border-radius:6px}
li button{float:right;background:red}
canvas{margin-top:10px}
</style>
</head>

<body>

<div id="auth" class="container">
<h2>Login</h2>
<input id="email">
<input id="password" type="password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" class="container" style="display:none">

<button onclick="logout()">Logout</button>

<div class="card">
<h3>Income</h3>
<input id="incomeDesc" placeholder="Source">
<input id="incomeAmount" type="number">
<button onclick="addIncome()">Add Income</button>
<ul id="incomeList"></ul>
</div>

<div class="card">
<h3>Expenses</h3>
<input id="desc" placeholder="Description">
<input id="amount" type="number">
<select id="category">
<option>Rent</option><option>Food</option><option>Water</option>
<option>Electricity</option><option>Garbage</option>
<option>Parents</option><option>Household</option>
<option>Clothing</option><option>Savings</option>
<option>WiFi</option><option>Misc</option>
</select>
<button onclick="addExpense()">Add Expense</button>
<ul id="expenseList"></ul>
</div>

<div class="card">
<h3>Budget</h3>
<input id="budgetInput">
<button onclick="setBudget()">Save</button>
<p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Income: <span id="incomeTotal">0</span></p>
<p>Expenses: <span id="expenseTotal">0</span></p>
<p id="profit"></p>
<p id="budgetStatus"></p>
<p id="savingsRate"></p>
<p id="risk"></p>

<button onclick="generatePDF()">Download PDF</button>

<canvas id="categoryChart"></canvas>
<canvas id="monthlyChart"></canvas>
<canvas id="trendChart"></canvas>
<canvas id="dailyChart"></canvas>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>Admin Panel</h3>
<ul id="userList"></ul>
</div>

</div>

<script>

// 🔥 REPLACE WITH YOUR REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY_HERE",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let catChart, monthChart, trendChart, dailyChart;

let currentExp=0,currentInc=0;
let catData={},mExp={},mInc={},dailyData={};

// AUTH
async function register(){
  let u=await auth.createUserWithEmailAndPassword(email.value,password.value);
  await db.collection("users").doc(u.user.uid).set({
    email:email.value,
    role:"user",
    budget:0
  });
}

async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){auth.signOut();}

// STATE
auth.onAuthStateChanged(async user=>{
if(user){
  authDiv.style.display="none";
  app.style.display="block";

  let doc=await db.collection("users").doc(user.uid).get();

  if(doc.data().role==="admin"){
    adminPanel.style.display="block";
    loadUsers();
  }

  loadData();

}else{
  authDiv.style.display="block";
  app.style.display="none";
}
});

// ADD
function addExpense(){
db.collection("users").doc(auth.currentUser.uid)
.collection("expenses").add({
desc:desc.value,
amount:parseFloat(amount.value),
category:category.value,
created:new Date()
});
}

function addIncome(){
db.collection("users").doc(auth.currentUser.uid)
.collection("income").add({
desc:incomeDesc.value||"Income",
amount:parseFloat(incomeAmount.value),
created:new Date()
});
}

// DELETE
function deleteExpense(id){
db.collection("users").doc(auth.currentUser.uid)
.collection("expenses").doc(id).delete();
}

function deleteIncome(id){
db.collection("users").doc(auth.currentUser.uid)
.collection("income").doc(id).delete();
}

// BUDGET
function setBudget(){
db.collection("users").doc(auth.currentUser.uid)
.set({budget:parseFloat(budgetInput.value)},{merge:true});
}

// LOAD DATA
function loadData(){

let uid=auth.currentUser.uid;

db.collection("users").doc(uid).onSnapshot(doc=>{
budget.textContent=doc.data().budget||0;
});

// EXPENSE
db.collection("users").doc(uid).collection("expenses")
.onSnapshot(s=>{

expenseList.innerHTML="";
currentExp=0;catData={};mExp={};dailyData={};

s.forEach(d=>{
let e=d.data();
currentExp+=e.amount;

catData[e.category]=(catData[e.category]||0)+e.amount;

let m=e.created.toDate().toLocaleString('default',{month:'short'});
mExp[m]=(mExp[m]||0)+e.amount;

let day=e.created.toDate().toLocaleDateString();
dailyData[day]=(dailyData[day]||0)+e.amount;

let li=document.createElement("li");
li.innerHTML=`${e.desc} - ${e.amount}
<button onclick="deleteExpense('${d.id}')">X</button>`;
expenseList.appendChild(li);
});

updateUI();

});

// INCOME
db.collection("users").doc(uid).collection("income")
.onSnapshot(s=>{

incomeList.innerHTML="";
currentInc=0;mInc={};

s.forEach(d=>{
let i=d.data();
currentInc+=i.amount;

let m=i.created.toDate().toLocaleString('default',{month:'short'});
mInc[m]=(mInc[m]||0)+i.amount;

let li=document.createElement("li");
li.innerHTML=`${i.desc} - ${i.amount}
<button onclick="deleteIncome('${d.id}')">X</button>`;
incomeList.appendChild(li);
});

updateUI();

});

}

// UPDATE UI
function updateUI(){

incomeTotal.textContent=currentInc;
expenseTotal.textContent=currentExp;

let p=currentInc-currentExp;
profit.textContent=p>=0?"Profit: "+p:"Loss: "+Math.abs(p);

let b=parseFloat(budget.textContent)||0;
let r=b-currentExp;
budgetStatus.textContent=r>=0?"Remaining: "+r:"Overspent: "+Math.abs(r);

let rate=currentInc>0?((p/currentInc)*100).toFixed(1):0;
savingsRate.textContent="Savings Rate: "+rate+"%";

// RISK
let risk="";
if(currentInc===0 && currentExp>0){risk="HIGH ⚠️";}
else if(currentExp>currentInc){risk="HIGH ⚠️";}
else if(currentExp>currentInc*0.7){risk="MEDIUM";}
else{risk="LOW ✅";}
document.getElementById("risk").textContent="Risk: "+risk;

drawCharts();

}

// CHARTS
function drawCharts(){

if(catChart)catChart.destroy();
catChart=new Chart(categoryChart,{
type:"pie",
data:{labels:Object.keys(catData),datasets:[{data:Object.values(catData)}]}
});

let labels=[...new Set([...Object.keys(mExp),...Object.keys(mInc)])];

if(monthChart)monthChart.destroy();
monthChart=new Chart(monthlyChart,{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Expenses",data:labels.map(l=>mExp[l]||0)},
{label:"Income",data:labels.map(l=>mInc[l]||0)}
]
}
});

if(trendChart)trendChart.destroy();
trendChart=new Chart(trendChart,{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Expenses",data:labels.map(l=>mExp[l]||0)},
{label:"Income",data:labels.map(l=>mInc[l]||0)}
]
}
});

// DAILY
let dLabels=Object.keys(dailyData);

if(dailyChart)dailyChart.destroy();
dailyChart=new Chart(dailyChart,{
type:"line",
data:{
labels:dLabels,
datasets:[
{label:"Daily Expenses",data:dLabels.map(d=>dailyData[d])}
]
}
});

}

// ADMIN
function loadUsers(){
db.collection("users").onSnapshot(s=>{
userList.innerHTML="";
s.forEach(d=>{
let u=d.data();
let li=document.createElement("li");
li.innerHTML=`${u.email}
<button onclick="makeAdmin('${d.id}')">Admin</button>
<button onclick="deleteUser('${d.id}')">Delete</button>`;
userList.appendChild(li);
});
});
}

function makeAdmin(uid){
db.collection("users").doc(uid).update({role:"admin"});
}

function deleteUser(uid){
db.collection("users").doc(uid).delete();
}

// PDF
async function generatePDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y=20;

doc.text("FINANCE REPORT",20,y); y+=10;
doc.text("Income: "+currentInc,20,y); y+=10;
doc.text("Expenses: "+currentExp,20,y); y+=10;
doc.text("Profit: "+(currentInc-currentExp),20,y); y+=15;

let snap=await db.collection("users").doc(auth.currentUser.uid)
.collection("expenses").get();

snap.forEach(d=>{
let e=d.data();
let date=e.created.toDate().toLocaleDateString();

doc.text(`${date} - ${e.desc} - ${e.amount}`,20,y);
y+=8;

if(y>270){doc.addPage(); y=20;}
});

doc.save("report.pdf");

}

// SW
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
  </html>
