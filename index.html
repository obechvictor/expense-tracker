<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:"Times New Roman"; margin:0; background:#f1f5f9; }
.wrapper { max-width:900px; margin:auto; padding:20px; }

.header {
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white; padding:20px; border-radius:10px;
}

.card {
  background:white; padding:15px; margin-top:15px;
  border-radius:10px;
}

input { width:100%; padding:8px; margin:5px 0; }
button { padding:8px; border:none; border-radius:5px; margin-top:5px; }

.item {
  display:flex; justify-content:space-between;
  border-bottom:1px solid #eee; padding:8px;
}

.minus { color:red; }
.plus { color:green; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="wrapper">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div class="wrapper">

<div class="header">
  <h2>Finance Dashboard</h2>
  <button id="editBtn" onclick="toggleEdit()">Edit</button>
</div>

<div class="card">
  <h3>Add Income</h3>
  <input id="incomeAmount" placeholder="Amount">
  <button onclick="addIncome()">Add Income</button>

  <h3>Add Expense</h3>
  <input id="expenseAmount" placeholder="Amount">
  <input id="expenseCategory" placeholder="Category">
  <button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
  <h2>Balance: KES <span id="balance">0</span></h2>
  <canvas id="lineChart"></canvas>
</div>

<div class="card">
  <h3>Expenses: KES <span id="totalExpense">0</span></h3>
  <canvas id="donutChart"></canvas>
</div>

<div class="card">
  <h3>Expense Records</h3>
  <div id="records"></div>
</div>

<div class="card">
  <h3>Income Records</h3>
  <div id="incomeList"></div>
</div>
  
<div class="card">
  <h3>Insights</h3>
  <div id="insights">Loading...</div>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let incomes = [];
let expenses = [];
let editMode = false;
let lineChart, donutChart;

// AUTH
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadData();
  }
});

// ADD INCOME
function addIncome(){
  let val = Number(incomeAmount.value);
  if(!val) return alert("Enter amount");

  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").add({
    amount: val,
    date: new Date().toISOString()
  });
}

// ADD EXPENSE
function addExpense(){
  let val = Number(expenseAmount.value);
  let cat = expenseCategory.value;

  if(!val || !cat) return alert("Fill all");

  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").add({
    amount: val,
    category: cat,
    date: new Date().toISOString()
  });
}

// LOAD DATA
function loadData(){
  let uid = auth.currentUser.uid;

  db.collection("users").doc(uid).collection("income")
  .onSnapshot(snap=>{
    incomes = [];
    snap.forEach(d=>{
      let i = d.data();
      i.id = d.id;
      incomes.push(i);
    });
    updateUI();
  });

  db.collection("users").doc(uid).collection("expenses")
  .onSnapshot(snap=>{
    expenses = [];
    snap.forEach(d=>{
      let e = d.data();
      e.id = d.id;
      expenses.push(e);
    });
    updateUI();
  });
}

// UPDATE UI
function updateUI(){

  let incomeTotal = incomes.reduce((a,b)=>a + (Number(b.amount)||0),0);
  let expenseTotal = expenses.reduce((a,b)=>a + (Number(b.amount)||0),0);

  document.getElementById("balance").innerText = incomeTotal - expenseTotal;
  document.getElementById("totalExpense").innerText = expenseTotal;

  renderList();
  drawCharts();
}

// RENDER LIST
function renderList(){

  let records = document.getElementById("records");
  let incomeList = document.getElementById("incomeList");

  records.innerHTML="";
  incomeList.innerHTML="";
  
  expenses.forEach(e => {

  records.innerHTML += `
    <div class="record">
      <span>${e.category}</span>
      <span>-KES ${e.amount}</span>

      ${
        editMode
        ? `<button onclick="deleteExpense('${e.id}')">Remove</button>`
        : ""
      }
    </div>
  `;
});
  incomes.forEach(i=>{
    incomeList.innerHTML += `
    <div class="item">
      <span>Income</span>
      <span class="plus">+KES ${i.amount}
        ${editMode ? `<button onclick="deleteIncome('${i.id}')">❌</button>` : ""}
      </span>
    </div>`;
  });
}

// DELETE
function deleteExpense(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").doc(id).delete();
}

function deleteIncome(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").doc(id).delete();
}

// TOGGLE EDIT
let editMode = false;

function toggleEdit(){

    editMode = !editMode;

    const btn = document.getElementById("editBtn");

    if(editMode){
        btn.innerText = "Done";
        btn.style.background = "#ef4444";
    }else{
        btn.innerText = "Edit";
        btn.style.background = "#ffffff";
    }

    renderList();
  }

function generateInsights(values, labels){

  if(!values.length){
    insights.innerHTML = "No data yet";
    return;
  }

  let total = values.reduce((a,b)=>a+b,0);
  let avg = Math.round(total / values.length);
  let max = Math.max(...values);
  let maxDay = labels[values.indexOf(max)];

  let trend = values[values.length-1] > values[0] ? "Increasing 📈" : "Decreasing 📉";

  insights.innerHTML = `
    <b>Total spent:</b> KES ${total}<br>
    <b>Daily average:</b> KES ${avg}<br>
    <b>Highest spending:</b> KES ${max} (${maxDay})<br>
    <b>Trend:</b> ${trend}
  `;
 }
// CHARTS
function drawCharts(){

  if(!expenses.length){
    if(lineChart) lineChart.destroy();
    return;
  }

  let daily = {};

  expenses.forEach(e=>{
    if(!e.date) return;

    let d = new Date(e.date);

    if(isNaN(d.getTime())) return;

    let key = d.toISOString().split("T")[0]; // YYYY-MM-DD (stable)

    daily[key] = (daily[key] || 0) + Number(e.amount || 0);
  });

  // SORT DATES
  let labels = Object.keys(daily).sort();
  let values = labels.map(l => daily[l]);

  // FORMAT LABELS (mobile friendly)
  let formattedLabels = labels.map(d=>{
    let date = new Date(d);
    return date.toLocaleDateString("en-KE", {day:'numeric', month:'short'});
  });

  // DESTROY OLD
  if(lineChart) lineChart.destroy();

  // LINE CHART (FIXED)
  lineChart = new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{
      labels: formattedLabels,
      datasets:[{
        label:"Daily Spending",
        data: values,
        fill:true,
        tension:0.4,
        borderWidth:2,
        pointRadius:3
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:true}
      },
      scales:{
        y:{
          beginAtZero:true,
          ticks:{
            callback:(v)=>"KES "+v
          }
        }
      }
    }
  });

  // DONUT (CLEAN)
  let cat = {};
  expenses.forEach(e=>{
    if(!e.category) return;
    cat[e.category]=(cat[e.category]||0)+Number(e.amount||0);
  });

  if(donutChart) donutChart.destroy();

  donutChart = new Chart(document.getElementById("donutChart"),{
    type:"doughnut",
    data:{
      labels:Object.keys(cat),
      datasets:[{
        data:Object.values(cat)
      }]
    }
  });

  generateInsights(values, labels);
    }
</script>

</body>
</html>
