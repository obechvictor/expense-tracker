<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance SaaS</title><script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script><style>
body {
  font-family: 'Times New Roman', Times, serif;
  font-size: 12pt;
  line-height: 1.15;
  margin: 40px;
  background: #fff;
  color: #000;
}
.card { border:1px solid #000; padding:15px; margin-bottom:20px; }
input, button { padding:6px; margin:5px 0; border:1px solid #000; }
</style></head><body><h2>Finance Dashboard (Cloud)</h2><div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div><div id="app" style="display:none;">
  <button onclick="logout()">Logout</button>  <div class="card">
    <h3>Add Expense</h3>
    <input id="desc" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <button onclick="addExpense()">Add</button>
  </div>  <div class="card">
    <h3>Budget</h3>
    <input id="budgetInput" placeholder="Budget">
    <button onclick="setBudget()">Save</button>
    <p>Budget: <span id="budget"></span></p>
  </div>  <div class="card">
    <h3>Summary</h3>
    <p>Total: <span id="total"></span></p>
  </div>  <ul id="list"></ul>
</div><script>
// 🔥 REPLACE WITH YOUR FIREBASE CONFIG

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409",
  measurementId: "G-V7B8WSWCZ8"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  }
});

async function addExpense(){
  const user = auth.currentUser;
  await db.collection('users').doc(user.uid).collection('expenses').add({
    desc:desc.value,
    amount:+amount.value,
    created:new Date()
  });
  loadData();
}

async function setBudget(){
  const user = auth.currentUser;
  await db.collection('users').doc(user.uid).set({
    budget:+budgetInput.value
  }, {merge:true});
  loadData();
}

async function loadData(){
  const user = auth.currentUser;
  const doc = await db.collection('users').doc(user.uid).get();
  const data = doc.data()||{};
  budget.textContent = data.budget||0;

  const snapshot = await db.collection('users').doc(user.uid).collection('expenses').get();
  let total=0;
  list.innerHTML='';

  snapshot.forEach(doc=>{
    const e = doc.data();
    total += e.amount;
    let li = document.createElement('li');
    li.textContent = `${e.desc} - ${e.amount}`;
    list.appendChild(li);
  });

  totalSpan = document.getElementById('total');
  totalSpan.textContent = total;
}
</script></body>
</html>
