<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack Banking</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0b1220;
--card:#111827;
--text:#e5e7eb;
--accent:#2563eb;
--good:#22c55e;
--bad:#ef4444;
}

body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:var(--card);padding:15px;border-radius:14px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none}
button{background:var(--accent);color:white;font-weight:600;cursor:pointer}
.hidden{display:none}
.badge{padding:3px 8px;border-radius:8px;font-size:11px}
.income{background:var(--good)}
.expense{background:var(--bad)}
.topbar{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth" class="container">
<div class="card">
<h2>Bank Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<div class="topbar">
<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="grid">
<div class="card"><h3>Balance</h3><h1 id="balance">0</h1></div>
<div class="card"><h3>Income</h3><h2 id="income">0</h2></div>
<div class="card"><h3>Expense</h3><h2 id="expense">0</h2></div>
</div>

<div class="card">
<h3>Add Transaction</h3>
<input id="amount" type="number" placeholder="Amount">
<select id="type">
<option>Income</option>
<option>Expense</option>
</select>
<input id="category" placeholder="Category">
<button onclick="addTx()">Add</button>
</div>

<div class="grid">
<div class="card"><h3>Daily</h3><canvas id="daily"></canvas></div>
<div class="card"><h3>Category</h3><canvas id="cat"></canvas></div>
<div class="card"><h3>Monthly</h3><canvas id="month"></canvas></div>
</div>

<div class="card">
<h3>Transactions</h3>
<ul id="list"></ul>
</div>

</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
apiKey:"AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
authDomain:"expense-tracker-2ee7b.firebaseapp.com",
projectId:"expense-tracker-2ee7b",
storageBucket:"expense-tracker-2ee7b.firebasestorage.app",
messagingSenderId:"306376576940",
appId:"1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let uid = null;
let tx = [];

/* ================= AUTH FIX ================= */
function showApp(){
document.getElementById('auth').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');
}

function showAuth(){
document.getElementById('auth').classList.remove('hidden');
document.getElementById('app').classList.add('hidden');
}

function register(){
const emailVal = document.getElementById('email').value;
const passVal = document.getElementById('password').value;

auth.createUserWithEmailAndPassword(emailVal, passVal)
.catch(e => alert(e.message));
}

function login(){
const emailVal = document.getElementById('email').value;
const passVal = document.getElementById('password').value;

auth.signInWithEmailAndPassword(emailVal, passVal)
.catch(e => alert(e.message));
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(user => {
if(user){
uid = user.uid;
showApp();
listen();
}else{
uid = null;
showAuth();
}
});

/* ================= FIRESTORE ================= */
function addTx(){
const amount = +document.getElementById('amount').value;
const type = document.getElementById('type').value;
const category = document.getElementById('category').value;

if(!amount || !category) return alert("Invalid input");

db.collection('users').doc(uid).collection('tx').add({
amount,type,category,date:Date.now()
});
}

function listen(){
db.collection('users').doc(uid).collection('tx')
.onSnapshot(snap => {
tx = [];
snap.forEach(doc => tx.push({id:doc.id,...doc.data()}));
render();
});
}

/* ================= RENDER ================= */
let a,b,c;

function render(){
let inc=0,exp=0;
let d={},cat={},mon={};

const list = document.getElementById('list');

list.innerHTML = tx.map(t => {
if(t.type==='Income') inc+=t.amount;
else exp+=t.amount;

let day = new Date(t.date).toDateString();
let month = new Date(t.date).toISOString().slice(0,7);

d[day]=(d[day]||0)+t.amount;
mon[month]=(mon[month]||0)+t.amount;
if(t.type==='Expense') cat[t.category]=(cat[t.category]||0)+t.amount;

return `<li><span class='badge ${t.type==='Income'?'income':'expense'}'>${t.type}</span> ${t.amount} ${t.category}</li>`;
}).join('');

document.getElementById('balance').innerText = inc-exp;
document.getElementById('income').innerText = inc;
document.getElementById('expense').innerText = exp;

charts(d,cat,mon);
}

/* ================= CHARTS FIX ================= */
function charts(d,cat,mon){
if(a)a.destroy();if(b)b.destroy();if(c)c.destroy();

a=new Chart(daily,{type:'line',data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]}});

b=new Chart(cat,{type:'doughnut',data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}});

c=new Chart(month,{type:'bar',data:{labels:Object.keys(mon),datasets:[{data:Object.values(mon)}]}});
}

</script>

</body>
</html>
