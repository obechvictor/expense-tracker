<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Pro SaaS</title>

    <link rel="manifest" href="manifest.json" />

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
      body {
        font-family: "Times New Roman";
        background: #0f172a;
        color: #fff;
        margin: 0;
      }

      .container {
        padding: 15px;
      }

      .card {
        background: #1e293b;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 10px;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border: none;
        border-radius: 6px;
      }

      button {
        background: #22c55e;
        color: #fff;
        font-weight: bold;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        background: #334155;
        margin: 5px 0;
        padding: 8px;
        border-radius: 6px;
      }

      li button {
        float: right;
        background: red;
      }

      canvas {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <!-- AUTH -->
    <div id="auth" class="container">
      <h2>Login</h2>
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="register()">Register</button>
      <button onclick="login()">Login</button>
    </div>

    <!-- APP -->
    <div id="app" class="container" style="display: none">
      <button onclick="logout()">Logout</button>

      <!-- INCOME -->
      <div class="card">
        <h3>Add Income</h3>
        <input id="incomeDesc" placeholder="Source" />
        <input id="incomeAmount" type="number" placeholder="Amount" />
        <button onclick="addIncome()">Add</button>
        <ul id="incomeList"></ul>
      </div>

      <!-- EXPENSE -->
      <div class="card">
        <h3>Add Expense</h3>
        <input id="desc" placeholder="Description" />
        <input id="amount" type="number" placeholder="Amount" />
        <select id="category">
          <option>Rent</option>
          <option>Food</option>
          <option>Water</option>
          <option>Electricity</option>
          <option>Garbage</option>
          <option>Parents</option>
          <option>Household Items</option>
          <option>Clothing</option>
          <option>Savings</option>
          <option>WiFi</option>
          <option>Miscellaneous</option>
        </select>
        <button onclick="addExpense()">Add</button>
        <ul id="expenseList"></ul>
      </div>

      <!-- BUDGET -->
      <div class="card">
        <h3>Budget</h3>
        <input id="budgetInput" placeholder="Enter budget" />
        <button onclick="setBudget()">Save</button>
        <p>Budget: <span id="budget">0</span></p>
      </div>

      <!-- DASHBOARD -->
      <div class="card">
        <h3>Dashboard</h3>
        <p>Income: <span id="incomeTotal">0</span></p>
        <p>Expenses: <span id="expenseTotal">0</span></p>
        <p id="profit"></p>
        <p id="budgetStatus"></p>
        <p id="savingsRate"></p>
        <button onclick="generatePDF()">Download PDF</button>
        <canvas id="categoryChart"></canvas>
      </div>

      <!-- MONTHLY -->
      <div class="card">
        <h3>Monthly</h3>
        <canvas id="monthlyChart"></canvas>
      </div>

      <!-- TREND -->
      <div class="card">
        <h3>Trend</h3>
        <canvas id="trendChart"></canvas>
      </div>

      <!-- ADMIN -->
      <div class="card" id="adminPanel" style="display: none">
        <h3>Admin Panel</h3>
        <ul id="userList"></ul>
      </div>
    </div>

    <script>
      // FIREBASE CONFIG
     const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409",
  measurementId: "G-V7B8WSWCZ8"
      };

      firebase.initializeApp(firebaseConfig);

      const auth = firebase.auth();
      const db = firebase.firestore();

      let categoryChart;
      let currentExp = 0;
      let currentInc = 0;
      let currentCat = {};

      // AUTH
      async function register() {
        const u = await auth.createUserWithEmailAndPassword(
          email.value,
          password.value
        );

        await db.collection("users").doc(u.user.uid).set({
          email: email.value,
          role: "user",
          budget: 0
        });
      }

      async function login() {
        await auth.signInWithEmailAndPassword(email.value, password.value);
      }

      function logout() {
        auth.signOut();
      }

      // AUTH STATE
      auth.onAuthStateChanged(async (user) => {
        if (user) {
          document.getElementById("auth").style.display = "none";
          document.getElementById("app").style.display = "block";

          const doc = await db.collection("users").doc(user.uid).get();

          if (doc.data().role === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            loadUsers();
          }

          loadData();
        } else {
          document.getElementById("auth").style.display = "block";
          document.getElementById("app").style.display = "none";
        }
      });

      // ADD DATA
      function addExpense() {
        db.collection("users")
          .doc(auth.currentUser.uid)
          .collection("expenses")
          .add({
            desc: desc.value,
            amount: parseFloat(amount.value),
            category: category.value,
            created: new Date()
          });
      }

      function addIncome() {
        db.collection("users")
          .doc(auth.currentUser.uid)
          .collection("income")
          .add({
            desc: incomeDesc.value || "Income",
            amount: parseFloat(incomeAmount.value),
            created: new Date()
          });
      }

      // DELETE
      function deleteExpense(id) {
        db.collection("users")
          .doc(auth.currentUser.uid)
          .collection("expenses")
          .doc(id)
          .delete();
      }

      function deleteIncome(id) {
        db.collection("users")
          .doc(auth.currentUser.uid)
          .collection("income")
          .doc(id)
          .delete();
      }

      // BUDGET
      function setBudget() {
        const val = parseFloat(budgetInput.value);
        if (isNaN(val)) return alert("Invalid");

        db.collection("users")
          .doc(auth.currentUser.uid)
          .set({ budget: val }, { merge: true });
      }

      // LOAD DATA
      function loadData() {
        const uid = auth.currentUser.uid;

        db.collection("users")
          .doc(uid)
          .onSnapshot((doc) => {
            budget.textContent = doc.data().budget || 0;
          });

        // EXPENSES
        db.collection("users")
          .doc(uid)
          .collection("expenses")
          .onSnapshot((snap) => {
            expenseList.innerHTML = "";
            let exp = 0;
            let cat = {};

            snap.forEach((d) => {
              const e = d.data();
              exp += e.amount;

              cat[e.category] = (cat[e.category] || 0) + e.amount;

              const li = document.createElement("li");
              li.innerHTML = `
                ${e.desc} - ${e.amount}
                <button onclick="deleteExpense('${d.id}')">X</button>
              `;
              expenseList.appendChild(li);
            });

            update(exp, null, cat);
          });

        // INCOME
        db.collection("users")
          .doc(uid)
          .collection("income")
          .onSnapshot((snap) => {
            incomeList.innerHTML = "";
            let inc = 0;

            snap.forEach((d) => {
              const i = d.data();
              inc += i.amount;

              const li = document.createElement("li");
              li.innerHTML = `
                ${i.desc} - ${i.amount}
                <button onclick="deleteIncome('${d.id}')">X</button>
              `;
              incomeList.appendChild(li);
            });

            update(null, inc, null);
          });
      }

      // UPDATE UI
      function update(exp, inc, cat) {
        if (exp !== null) currentExp = exp;
        if (inc !== null) currentInc = inc;
        if (cat !== null) currentCat = cat;

        incomeTotal.textContent = currentInc;
        expenseTotal.textContent = currentExp;

        const profitVal = currentInc - currentExp;
        profit.textContent =
          profitVal >= 0
            ? "Profit: " + profitVal
            : "Loss: " + Math.abs(profitVal);

        const rate =
          currentInc > 0
            ? ((profitVal / currentInc) * 100).toFixed(1)
            : 0;

        savingsRate.textContent = "Savings Rate: " + rate + "%";

        drawCategory(currentCat);
      }

      // CHART
      function drawCategory(data) {
        if (categoryChart) categoryChart.destroy();

        categoryChart = new Chart(
          document.getElementById("categoryChart"),
          {
            type: "pie",
            data: {
              labels: Object.keys(data),
              datasets: [{ data: Object.values(data) }]
            }
          }
        );
      }

      // ADMIN
      function loadUsers() {
        db.collection("users").onSnapshot((snap) => {
          userList.innerHTML = "";

          snap.forEach((doc) => {
            const u = doc.data();

            const li = document.createElement("li");
            li.innerHTML = `
              ${u.email} (${u.role})
              <button onclick="makeAdmin('${doc.id}')">Admin</button>
              <button onclick="deleteUser('${doc.id}')">Delete</button>
            `;

            userList.appendChild(li);
          });
        });
      }

      function makeAdmin(uid) {
        db.collection("users").doc(uid).update({ role: "admin" });
      }

      function deleteUser(uid) {
        db.collection("users").doc(uid).delete();
      }

      // PDF
      async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.text("Finance Report", 20, 20);
        doc.text("Income: " + currentInc, 20, 40);
        doc.text("Expenses: " + currentExp, 20, 50);
        doc.text("Profit: " + (currentInc - currentExp), 20, 60);

        doc.save("report.pdf");
      }

      // SERVICE WORKER
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
        </html>
