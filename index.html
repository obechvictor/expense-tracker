<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Pro SaaS</title>

<link rel="manifest" href="manifest.json">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:'Times New Roman';background:#0f172a;color:#fff;margin:0;}
.container{padding:15px;}
.card{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px;}
button{background:#22c55e;color:#fff;font-weight:bold;}
ul{list-style:none;padding:0;}
li{background:#334155;margin:5px 0;padding:8px;border-radius:6px;}
li button{float:right;background:red;}
canvas{margin-top:10px;}
</style>
</head>

<body>

<div id="auth" class="container">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" class="container" style="display:none;">

<button onclick="logout()">Logout</button>

<div class="card">
<h3>Add Income</h3>
<input id="incomeDesc">
<input id="incomeAmount" type="number">
<button onclick="addIncome()">Add</button>
<ul id="incomeList"></ul>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="desc">
<input id="amount" type="number">
<select id="category">
<option>Rent</option><option>Food</option><option>Water</option>
<option>Electricity</option><option>Garbage</option>
<option>Parents</option><option>Household Items</option>
<option>Clothing</option><option>Savings</option>
<option>WiFi</option><option>Miscellaneous</option>
</select>
<button onclick="addExpense()">Add</button>
<ul id="expenseList"></ul>
</div>

<div class="card">
<h3>Budget</h3>
<input id="budgetInput">
<button onclick="setBudget()">Save</button>
<p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Income: <span id="incomeTotal">0</span></p>
<p>Expenses: <span id="expenseTotal">0</span></p>
<p id="profit"></p>
<p id="budgetStatus"></p>
<p id="savingsRate"></p>
<button onclick="generatePDF()">Download PDF</button>
<canvas id="categoryChart"></canvas>
</div>

<div class="card">
<h3>Monthly</h3>
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<h3>Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="card" id="adminPanel" style="display:none;">
<h3>Admin Panel</h3>
<ul id="userList"></ul>
</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// AUTH
async function register(){
  let u = await auth.createUserWithEmailAndPassword(email.value,password.value);
  await db.collection("users").doc(u.user.uid).set({
    email: email.value,
    role: "user",
    budget:0
  });
}

async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){ auth.signOut(); }

// STATE
auth.onAuthStateChanged(async user=>{
  if(user){

    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    let doc = await db.collection("users").doc(user.uid).get();

    if(doc.data().role==="admin"){
      adminPanel.style.display="block";
      loadUsers();
    }

    loadData();

  }else{
    auth.style.display="block";
    app.style.display="none";
  }
});

// ADD
function addExpense(){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").add({
    desc:desc.value,
    amount:parseFloat(amount.value),
    category:category.value,
    created:new Date()
  });
}

function addIncome(){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").add({
    desc:incomeDesc.value||"Income",
    amount:parseFloat(incomeAmount.value),
    created:new Date()
  });
}

// DELETE
function deleteExpense(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").doc(id).delete();
}

function deleteIncome(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").doc(id).delete();
}

// BUDGET
function setBudget(){
  db.collection("users").doc(auth.currentUser.uid)
  .set({budget:parseFloat(budgetInput.value)},{merge:true});
}

// LOAD USER DATA
function loadData(){

let u = auth.currentUser;

db.collection("users").doc(u.uid).onSnapshot(doc=>{
  budget.textContent = doc.data().budget || 0;
});

db.collection("users").doc(u.uid).collection("expenses")
.onSnapshot(s=>{
  expenseList.innerHTML="";
  let exp=0,cat={};

  s.forEach(d=>{
    let e=d.data();
    exp+=e.amount;
    cat[e.category]=(cat[e.category]||0)+e.amount;

    let li=document.createElement("li");
    li.innerHTML=`${e.desc}-${e.amount}
    <button onclick="deleteExpense('${d.id}')">X</button>`;
    expenseList.appendChild(li);
  });

  update(exp,null,cat);
});

db.collection("users").doc(u.uid).collection("income")
.onSnapshot(s=>{
  incomeList.innerHTML="";
  let inc=0;

  s.forEach(d=>{
    let i=d.data();
    inc+=i.amount;

    let li=document.createElement("li");
    li.innerHTML=`${i.desc}-${i.amount}
    <button onclick="deleteIncome('${d.id}')">X</button>`;
    incomeList.appendChild(li);
  });

  update(null,inc,null);
});

}

// UPDATE
let currentExp=0,currentInc=0,currentCat={};

function update(exp,inc,cat){

if(exp!==null) currentExp=exp;
if(inc!==null) currentInc=inc;
if(cat!==null) currentCat=cat;

incomeTotal.textContent=currentInc;
expenseTotal.textContent=currentExp;

let p=currentInc-currentExp;
profit.textContent=p>=0?"Profit:"+p:"Loss:"+Math.abs(p);

let rate=currentInc>0?((p/currentInc)*100).toFixed(1):0;
savingsRate.textContent="Savings:"+rate+"%";

drawCategory(currentCat);
}

// CHART
let categoryChart;

function drawCategory(data){
if(categoryChart)categoryChart.destroy();

categoryChart=new Chart(document.getElementById("categoryChart"),{
type:"pie",
data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}
});
}

// ADMIN
function loadUsers(){
db.collection("users").onSnapshot(s=>{
  userList.innerHTML="";
  s.forEach(doc=>{
    let u=doc.data();
    let li=document.createElement("li");
    li.innerHTML=`${u.email}
    <button onclick="makeAdmin('${doc.id}')">Admin</button>
    <button onclick="deleteUser('${doc.id}')">Delete</button>`;
    userList.appendChild(li);
  });
});
}

function makeAdmin(uid){
db.collection("users").doc(uid).update({role:"admin"});
}

function deleteUser(uid){
db.collection("users").doc(uid).delete();
}

// PDF
async function generatePDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("Finance Report",20,20);
doc.text("Income: "+currentInc,20,40);
doc.text("Expenses: "+currentExp,20,50);
doc.text("Profit: "+(currentInc-currentExp),20,60);

doc.save("report.pdf");
}

// SERVICE WORKER
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
  </html>
