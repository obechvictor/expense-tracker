<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:"Times New Roman";
background:#f4f7fb;
margin:0;
padding:15px;
color:#222;
}

.card{
background:#fff;
padding:18px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.hidden{
display:none;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
background:#16c94c;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.small{
width:auto;
padding:6px 12px;
font-size:12px;
}

.del{
width:auto;
padding:4px 8px;
font-size:11px;
background:red;
margin-left:10px;
}

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#16c94c;
color:white;
}

canvas{
width:100% !important;
height:280px !important;
}

.transaction-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.green{
color:green;
font-weight:bold;
}

.red{
color:red;
font-weight:bold;
}

.orange{
color:orange;
font-weight:bold;
}

.auth-box{
max-width:400px;
margin:40px auto;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="authSection" class="auth-box">

<div class="card">

<h2>Expense Tracker</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<div class="card header">
<h2>Finance Dashboard</h2>
<button class="small" onclick="toggleEdit()" id="editBtn">Edit</button>
</div>

<div class="row">

<div class="card">
<h2>Income</h2>
<p id="income">KSh 0</p>
</div>

<div class="card">
<h2>Expenses</h2>
<p id="expenses">KSh 0</p>
</div>

<div class="card">
<h2>Balance</h2>
<p id="balance">KSh 0</p>
</div>

</div>

<!-- BUDGET -->

<div class="card">

<h2>Budget</h2>

<input id="budgetInput" type="number" placeholder="Enter Budget">

<button onclick="setBudget()">Set Budget</button>

<p id="budgetStatus">No budget set</p>

</div>

<!-- ADD TRANSACTION -->

<div class="card">

<h2>Add Transaction</h2>

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<input id="category" placeholder="Category">

<button onclick="addTransaction()">Add</button>

</div>

<!-- CHARTS -->
  
<div class="chart-box"><h2></h2>Daily Trend</h2><canvas id="dailyChart"></canvas></div>
<div class="chart-box"><h2>Monthly Comparison</h2><canvas id="monthlyChart"></canvas></div>
<div class="chart-box"><h2>Expense Breakdown</h2><canvas id="donutChart"></canvas></div>
  
<!-- INSIGHTS -->

<div class="card">

<h2>Financial Insights</h2>

<div id="insights"></div>

</div>

<!-- PDF -->

<div class="card">

<button onclick="downloadPDF()">PDF Report</button>

</div>

<!-- TRANSACTIONS -->

<div class="card">

<h2>Records</h2>

<div id="transactionList"></div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
deleteDoc,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
authDomain: "expense-tracker-2ee7b.firebaseapp.com",
databaseURL: "https://expense-tracker-2ee7b-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "expense-tracker-2ee7b",
storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
messagingSenderId: "306376576940",
appId: "1:306376576940:web:f7bf235be67524c9c8b409",
measurementId: "G-V7B8WSWCZ8"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* VARIABLES */

let currentUser=null;

let transactions=[];

let budget=0;

let editMode=false;

let dailyChart;
let monthlyChart;
let donutChart;

/* LOGIN */

window.register=async()=>{

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

try{

await createUserWithEmailAndPassword(auth,email,password);

alert("Registered");

}catch(err){

alert(err.message);

}

};

window.login=async()=>{

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

}catch(err){

alert(err.message);

}

};

/* AUTH STATE */

onAuthStateChanged(auth,async(user)=>{

if(user){

currentUser=user;

authSection.classList.add("hidden");

dashboard.classList.remove("hidden");

await loadBudget();

await loadTransactions();

render();

}

});

/* BUDGET */

window.setBudget=async()=>{

budget=Number(budgetInput.value);

await setDoc(doc(db,"users",currentUser.uid),{

budget:budget

});

render();

};

async function loadBudget(){

const snap=await getDoc(doc(db,"users",currentUser.uid));

if(snap.exists()){

budget=snap.data().budget||0;

budgetInput.value=budget;

}

}

/* ADD TRANSACTION */

window.addTransaction=async()=>{

const amount=Number(document.getElementById("amount").value);

const type=document.getElementById("type").value;

const category=document.getElementById("category").value;

if(!amount||!category){

alert("Fill all fields");

return;

}

await addDoc(

collection(db,"users",currentUser.uid,"transactions"),

{
amount,
type,
category,
date:new Date().toISOString()
}

);

document.getElementById("amount").value="";
document.getElementById("category").value="";

await loadTransactions();

render();

};

/* LOAD */

async function loadTransactions(){

transactions=[];

const q=query(collection(db,"users",currentUser.uid,"transactions"));

const snap=await getDocs(q);

snap.forEach(docu=>{

transactions.push({

id:docu.id,
...docu.data()

});

});

}

/* DELETE */

window.deleteTransaction=async(id)=>{

await deleteDoc(doc(db,"users",currentUser.uid,"transactions",id));

await loadTransactions();

render();

};

/* EDIT MODE */

window.toggleEdit=()=>{

editMode=!editMode;

editBtn.innerText=editMode?"Done":"Edit";

render();

};

/* SUM */

function sum(type){

return transactions
.filter(t=>t.type===type)
.reduce((a,b)=>a+b.amount,0);

}

/* RENDER */

function render(){

const incomeTotal=sum("income");

const expenseTotal=sum("expense");

const balance=incomeTotal-expenseTotal;

income.innerText="KSh "+incomeTotal;

expenses.innerText="KSh "+expenseTotal;

document.getElementById("balance").innerText="KSh "+balance;

budgetStatus.innerHTML=
budget>0
? "Remaining: KSh "+(budget-expenseTotal)
: "No budget set";

/* TRANSACTIONS */

transactionList.innerHTML="";

transactions.forEach(t=>{

transactionList.innerHTML+=`

<div class="transaction-item">

<span>
${t.category} - KSh ${t.amount}
</span>

${editMode?

`<button class="del" onclick="deleteTransaction('${t.id}')">X</button>`

:""}

</div>

`;

});

/* INSIGHTS */

let ratio=budget>0?((expenseTotal/budget)*100).toFixed(1):0;

let advice="";
let cls="green";

if(ratio>=100){

advice="You are over budget. Reduce non-essential spending.";

cls="red";

}
else if(ratio>=75){

advice="Caution: spending is getting high.";

cls="orange";

}
else{

advice="Healthy spending habits.";

cls="green";

}

insights.innerHTML=`

<p><b>Monthly Income:</b> KSh ${incomeTotal}</p>

<p><b>Monthly Expenses:</b> KSh ${expenseTotal}</p>

<p><b>Expense Ratio:</b> ${ratio}%</p>

<p class="${cls}">${advice}</p>

`;

/* CHARTS */

drawCharts();

}

/* CHARTS */

function drawCharts(){

/* DAILY */

const daily={};

transactions
.filter(t=>t.type==="expense")
.forEach(t=>{

const d=t.date.split("T")[0];

daily[d]=(daily[d]||0)+t.amount;

});

const labels=Object.keys(daily).sort();

const values=labels.map(x=>daily[x]);

if(dailyChart) dailyChart.destroy();

dailyChart=new Chart(

document.getElementById("dailyChart").getContext("2d"),

{
type:"line",

data:{
labels:labels,

datasets:[{
label:"Daily Expenses",
data:values,
borderColor:"#16c94c",
fill:false,
tension:0.4
}]
}

}

);

/* MONTHLY */

if(monthlyChart) monthlyChart.destroy();

monthlyChart=new Chart(

document.getElementById("monthlyChart").getContext("2d"),

{
type:"bar",

data:{
labels:["This Month"],

datasets:[

{
label:"Income",
data:[sum("income")],
backgroundColor:"#36a2eb"
},

{
label:"Expense",
data:[sum("expense")],
backgroundColor:"#ff6384"
}

]

}

}

);

/* DONUT */

const cat={};

transactions
.filter(t=>t.type==="expense")
.forEach(t=>{

cat[t.category]=(cat[t.category]||0)+t.amount;

});

if(donutChart) donutChart.destroy();

donutChart=new Chart(

document.getElementById("donutChart").getContext("2d"),

{
type:"doughnut",

data:{
labels:Object.keys(cat),

datasets:[{

data:Object.values(cat),

backgroundColor:[
"#36a2eb",
"#ff6384",
"#ffce56",
"#4bc0c0",
"#9966ff"
]

}]

}

}

);

}

/* PDF */

window.downloadPDF=()=>{

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.text("Finance Report",20,20);

doc.text("Income: KSh "+sum("income"),20,40);

doc.text("Expenses: KSh "+sum("expense"),20,50);

doc.text("Balance: KSh "+(sum("income")-sum("expense")),20,60);

doc.save("finance-report.pdf");

};

</script>
</body>
</html>
