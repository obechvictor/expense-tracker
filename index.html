<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Report System</title><style>
body {
  font-family: 'Times New Roman', Times, serif;
  font-size: 12pt;
  line-height: 1.15;
  margin: 40px;
  background: #ffffff;
  color: #000000;
}

h1, h2, h3 { font-weight: bold; }

.header { text-align:center; margin-bottom:20px; }
.header img { width:80px; display:block; margin:auto; }

.section { margin-bottom: 20px; }
.card { border: 1px solid #000; padding: 15px; }

input, button {
  font-family: 'Times New Roman';
  font-size: 12pt;
  padding: 6px;
  margin: 5px 0;
  border: 1px solid #000;
}

ul { list-style:none; padding:0; }
li { border-bottom:1px solid #000; padding:6px 0; display:flex; justify-content:space-between; }

@media print {
  button, input { display:none; }
}
</style></head><body><div id="loginSection">
  <h2>Login / Register</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div><div id="app" style="display:none;"><div class="header">
  <img src="https://via.placeholder.com/80" alt="Logo">
  <h1>Company Financial Report</h1>
</div><div class="section card">
  <h3>Add Expense</h3>
  <input type="text" id="desc" placeholder="Description">
  <input type="number" id="amount" placeholder="Amount">
  <input type="date" id="date">
  <button onclick="addExpense()">Add</button>
</div><div class="section card">
  <h3>Budget</h3>
  <input type="number" id="budgetInput" placeholder="Set Monthly Budget">
  <button onclick="setBudget()">Save Budget</button>
  <p>Budget: KES <span id="budget">0</span></p>
  <p>Remaining: KES <span id="remaining">0</span></p>
</div><div class="section card">
  <h3>Summary</h3>
  <p>Total Expenses: KES <span id="monthTotal">0</span></p>
  <p>Transactions: <span id="count">0</span></p>
  <p>Average: KES <span id="average">0</span></p>
  <p>Status: <span id="status"></span></p>
</div><div class="section card">
  <h3>Expenses</h3>
  <ul id="list"></ul>
</div><div class="section">
  <button onclick="window.print()">Export to PDF</button>
</div></div><script>
let currentUser = null;

function register(){
  const u = username.value;
  const p = password.value;
  if(!u||!p) return alert('Enter details');
  let users = JSON.parse(localStorage.getItem('users'))||{};
  if(users[u]) return alert('User exists');
  users[u] = {password:p, expenses:[], budget:0};
  localStorage.setItem('users', JSON.stringify(users));
  alert('Registered');
}

function login(){
  const u = username.value;
  const p = password.value;
  let users = JSON.parse(localStorage.getItem('users'))||{};
  if(!users[u] || users[u].password!==p) return alert('Invalid');
  currentUser = u;
  document.getElementById('loginSection').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

function getData(){
  let users = JSON.parse(localStorage.getItem('users'));
  return users[currentUser];
}

function saveData(data){
  let users = JSON.parse(localStorage.getItem('users'));
  users[currentUser]=data;
  localStorage.setItem('users', JSON.stringify(users));
}

function addExpense(){
  let data = getData();
  data.expenses.push({desc:desc.value, amount:+amount.value, date:date.value});
  saveData(data);
  render();
}

function setBudget(){
  let data = getData();
  data.budget = +budgetInput.value;
  saveData(data);
  render();
}

function render(){
  let data = getData();
  let list = document.getElementById('list');
  list.innerHTML='';

  let total=0, count=0;
  let now=new Date();

  data.expenses.forEach(e=>{
    let d=new Date(e.date);
    if(d.getMonth()===now.getMonth()){
      total+=e.amount;
      count++;
    }
    let li=document.createElement('li');
    li.textContent=`${e.desc} - KES ${e.amount}`;
    list.appendChild(li);
  });

  let avg = count? (total/count).toFixed(2):0;
  let remaining = data.budget - total;

  monthTotal.textContent=total;
  countEl = document.getElementById('count'); countEl.textContent=count;
  average.textContent=avg;
  budget.textContent=data.budget;
  remainingSpan = document.getElementById('remaining'); remainingSpan.textContent=remaining;
  status.textContent = remaining<0?'Over Budget':'Within Budget';
}
</script></body>
</html>
