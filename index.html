<!DOCTYPE html><html lang="en">
<head><!-- PAGE --><meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">
<title>Expense Tracker</title><!-- CHART --><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><!-- STYLE --><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Times New Roman"}
body{background:#f4f7fb;padding:15px}
.box,.auth,.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,.08)
}
input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px
}
button{
background:#16c94c;
color:white;
border:none
}
.dashboard{display:none}
.cards{
display:flex;
gap:10px;
flex-wrap:wrap
}
.card{flex:1}
.row{
display:flex;
justify-content:space-between;
align-items:center
}
.t{
padding:10px 0;
border-bottom:1px solid #eee
}
.small-btn{
width:auto;
background:white;
color:#16c94c
}
</style></head>
<body><!-- AUTH --><div class="auth" id="authSection">
<h2>Expense Tracker</h2><input id="email"
placeholder="Email">

<input id="password"
type="password"
placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div><!-- DASHBOARD --><div class="dashboard" id="dashboard"><div class="box row">
<h2>Finance Dashboard</h2><button id="editBtn"
class="small-btn"
onclick="toggleEdit()">
Edit
</button>

</div><!-- CARDS --><div class="cards"><div class="card">
<h3>Income</h3>
<p id="income">0</p>
</div><div class="card">
<h3>Expense</h3>
<p id="expenses">0</p>
</div><div class="card">
<h3>Balance</h3>
<p id="balance">0</p>
</div></div><!-- BUDGET --><div class="box">
<h3>Budget</h3><input id="budgetInput"
type="number">

<button onclick="setBudget()">
Set Budget
</button><p id="budgetStatus">
No budget set
</p>
</div><!-- ADD --><div class="box">
<h3>Add Transaction</h3><input id="amount"
type="number"
placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select><input id="category"
placeholder="Category">

<button onclick="addTransaction()">
Add
</button>
</div><!-- CHARTS --><div class="box">
<canvas id="dailyChart"></canvas>
</div><div class="box">
<canvas id="monthlyChart"></canvas>
</div><div class="box">
<canvas id="donutChart"></canvas>
</div><!-- INSIGHTS --><div class="box" id="insights"></div><!-- RECORDS --><div class="box" id="transactionList"></div></div><script type="module">

/* FIREBASE */
import {
initializeApp
}
from
'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from
'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from
'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  databaseURL: "https://expense-tracker-2ee7b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409",
  measurementId: "G-V7B8WSWCZ8"
};

/* INIT */
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

/* VARIABLES */
let transactions=[];
let budget=
Number(localStorage.getItem('budget'))||0;
let edit=false;

let dailyChart;
let monthlyChart;
let donutChart;

/* REGISTER */
window.register=async()=>{
try{
await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);
alert('Registered');
}catch(e){
alert(e.message);
}
};

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

authSection.style.display='none';
dashboard.style.display='block';

budgetInput.value=budget;

load();

}catch(e){
alert(e.message);
}
};

/* BUDGET */
window.setBudget=()=>{
budget=Number(budgetInput.value);

localStorage.setItem(
'budget',
budget
);

update();
};

/* ADD */
window.addTransaction=async()=>{

await addDoc(
collection(db,'transactions'),
{
amount:Number(amount.value),
type:type.value,
category:category.value,
date:new Date()
}
);

load();
};

/* EDIT */
window.toggleEdit=()=>{
edit=!edit;
editBtn.innerText=
edit?'Done':'Edit';
render();
};

/* DELETE */
window.del=async(i)=>{
await deleteDoc(
doc(
db,
'transactions',
transactions[i].id
)
);
load();
};

/* LOAD */
async function load(){

transactions=[];

const qs=
await getDocs(
collection(db,'transactions')
);

qs.forEach(d=>{
transactions.push({
id:d.id,
...d.data()
});
});

update();
}

/* SUM */
function sum(t){
return transactions
.filter(x=>x.type===t)
.reduce((a,b)=>a+b.amount,0);
}

/* UPDATE */
function update(){

const i=sum('income');
const e=sum('expense');

income.innerText=i;
expenses.innerText=e;
balance.innerText=i-e;

budgetStatus.innerText=
budget
?(e<=budget
?'Remaining: '+(budget-e)
:'Over by '+(e-budget))
:'No budget set';

render();
daily();
monthly();
donut();
insight();
}

/* RENDER */
function render(){

transactionList.innerHTML='';

transactions.forEach((t,i)=>{

transactionList.innerHTML+=`
<div class="t">
${t.category} - ${t.amount}

${edit?
`<button
style="width:auto;background:red"
onclick="del(${i})">
Delete
</button>`:''}

</div>
`;

});
}

/* DATE */
function dt(t){
return t.date?.seconds
?new Date(t.date.seconds*1000)
:new Date();
}

/* DAILY */
function daily(){

const d={};

transactions
.filter(t=>t.type==='expense')
.forEach(t=>{

const x=
dt(t)
.toISOString()
.split('T')[0];

d[x]=(d[x]||0)+t.amount;

});

const s=
Object.keys(d).sort();

if(dailyChart)
dailyChart.destroy();

dailyChart=
new Chart(
document.getElementById('dailyChart'),
{
type:'line',
data:{
labels:s,
datasets:[{
label:'Daily',
data:s.map(x=>d[x]),
tension:.3
}]
}
});
}

/* MONTHLY */
function monthly(){

const i={},e={};

transactions.forEach(t=>{

const m=
dt(t)
.toLocaleString(
'default',
{month:'short'}
);

(t.type==='income'?i:e)[m]=
((t.type==='income'?i:e)[m]||0)
+t.amount;

});

const l=[
...new Set([
...Object.keys(i),
...Object.keys(e)
])
];

if(monthlyChart)
monthlyChart.destroy();

monthlyChart=
new Chart(
document.getElementById('monthlyChart'),
{
type:'bar',
data:{
labels:l,
datasets:[
{
label:'Income',
data:l.map(x=>i[x]||0)
},
{
label:'Expense',
data:l.map(x=>e[x]||0)
}
]
}
});
}

/* DONUT */
function donut(){

const c={};

transactions
.filter(t=>t.type==='expense')
.forEach(t=>{
c[t.category]=
(c[t.category]||0)+t.amount;
});

if(donutChart)
donutChart.destroy();

donutChart=
new Chart(
document.getElementById('donutChart'),
{
type:'doughnut',
data:{
labels:Object.keys(c),
datasets:[{
data:Object.values(c)
}]
}
});
}

/* INSIGHT */
function insight(){const inc=sum('income'),exp=sum('expense'),bal=inc-exp,rate=inc?(((bal)/inc)*100).toFixed(1):0;let msg=<p><b>Savings Rate:</b> ${rate}%</p>;if(rate<10)msg+=<p style='color:red'>⚠ Critical: Your savings are dangerously low.</p><p>Advice: Cut non-essential spending immediately.</p>;else if(rate<20)msg+=<p style='color:orange'>⚠ Warning: Savings below healthy range.</p><p>Advice: Reduce flexible expenses like entertainment.</p>;else msg+=<p style='color:green'>✓ Healthy savings trend.</p>;if(budget&&exp>budget)msg+=<p style='color:red'>🚨 Budget exceeded by KSh ${exp-budget}</p><p>Advice: Freeze discretionary purchases.</p>;const cats={};transactions.filter(t=>t.type==='expense').forEach(t=>cats[t.category]=(cats[t.category]||0)+t.amount);const top=Object.keys(cats).reduce((a,b)=>cats[a]>cats[b]?a:b,Object.keys(cats)[0]);if(top)msg+=<p>Highest spending: <b>${top}</b></p><p>Advice: Review this category for savings opportunities.</p>;if(bal<0)msg+=<p style='color:red'>🚨 Negative balance detected.</p><p>Advice: Prioritize income growth or immediate expense cuts.</p>;insights.innerHTML=msg}

insights.innerHTML=
'<h3>Financial Insights</h3>'+
'<p>Income: '+i+'</p>'+
'<p>Expense: '+e+'</p>'+
'<p>Ratio: '+r+'%</p>'+
'<p>Advice: '+advice+'</p>'+
'<p>Budget: '+
(budget||'Not set')+
'</p>';
}

</script>
</body>
</html>
