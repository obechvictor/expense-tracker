<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance SaaS</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Times New Roman';
      font-size: 12pt;
      line-height: 1.15;
      background: #0f172a;
      color: #fff;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      background: #22c55e;
      color: #fff;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #334155;
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    #splash {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <img src="icon-192.png" width="100" />
    <h2>Finance SaaS</h2>
  </div>

  <!-- AUTH -->
  <div id="auth" class="container">
    <h2>Login</h2>
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="app" class="container" style="display:none;">
    
    <button onclick="logout()">Logout</button>

    <!-- INCOME -->
    <div class="card">
      <h3>Add Income</h3>
      <input id="incomeDesc" placeholder="Source" />
      <input id="incomeAmount" type="number" />
      <button onclick="addIncome()">Add Income</button>
    </div>

    <!-- EXPENSE -->
    <div class="card">
      <h3>Add Expense</h3>
      <input id="desc" placeholder="Description" />
      <input id="amount" type="number" />

      <select id="category">
        <option>Rent</option>
        <option>Food</option>
        <option>Water</option>
        <option>Electricity</option>
        <option>Garbage</option>
        <option>Parents</option>
        <option>Household Items</option>
        <option>Clothing</option>
        <option>Savings</option>
        <option>WiFi</option>
        <option>Miscellaneous</option>
      </select>

      <button onclick="addExpense()">Add</button>
    </div>

    <!-- BUDGET -->
    <div class="card">
      <h3>Budget</h3>
      <input id="budgetInput" placeholder="Enter budget" />
      <button onclick="setBudget()">Save</button>
      <p>Budget: <span id="budget">0</span></p>
    </div>

    <!-- ANALYTICS -->
    <div class="card">
      <h3>Analytics</h3>
      <p>Income: <span id="incomeTotal">0</span></p>
      <p>Expenses: <span id="total">0</span></p>
      <p id="profit"></p>
      <p id="balanceStatus"></p>
      <p id="monthlyChange"></p>

      <canvas id="chart"></canvas>
      <canvas id="monthlyChart"></canvas>

      <button onclick="exportPDF()">Download Report</button>
    </div>

    <!-- EXPENSE LIST -->
    <div class="card">
      <h3>Expenses</h3>
      <ul id="list"></ul>
    </div>

    <!-- ADMIN -->
    <div class="card" id="adminPanel" style="display:none;">
      <h3>Admin Panel</h3>
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersList"></tbody>
      </table>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "expense-tracker-2ee7b.firebaseapp.com",
      projectId: "expense-tracker-2ee7b"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    let chart, monthlyChart;

    async function register() {
      const userCred = await auth.createUserWithEmailAndPassword(email.value, password.value);
      await db.collection("users").doc(userCred.user.uid).set({
        email: email.value,
        role: "user",
        budget: 0
      });
    }

    function login() {
      auth.signInWithEmailAndPassword(email.value, password.value);
    }

    function logout() {
      auth.signOut();
    }

    auth.onAuthStateChanged(async user => {
      if (user) {
        authDiv.style.display = "none";
        app.style.display = "block";
        loadData();
        loadAdmin();
      } else {
        authDiv.style.display = "block";
        app.style.display = "none";
      }
    });

    async function addExpense() {
      const u = auth.currentUser;
      await db.collection("users").doc(u.uid)
        .collection("expenses").add({
          desc: desc.value,
          amount: +amount.value,
          category: category.value,
          created: new Date()
        });
    }

    async function addIncome() {
      const u = auth.currentUser;
      await db.collection("users").doc(u.uid)
        .collection("income").add({
          desc: incomeDesc.value,
          amount: +incomeAmount.value,
          created: new Date()
        });
    }

    function loadData() {
      const u = auth.currentUser;

      db.collection("users").doc(u.uid)
        .onSnapshot(doc => {
          budget.textContent = doc.data().budget || 0;
        });

      db.collection("users").doc(u.uid)
        .collection("expenses")
        .onSnapshot(snapshot => {

          let total = 0;
          let categories = {};
          let monthly = {};

          list.innerHTML = "";

          snapshot.forEach(d => {
            const e = d.data();
            total += e.amount;

            categories[e.category] = (categories[e.category] || 0) + e.amount;

            const date = e.created.toDate();
            const key = date.getFullYear() + "-" + (date.getMonth() + 1);
            monthly[key] = (monthly[key] || 0) + e.amount;

            let li = document.createElement("li");
            li.innerHTML = `
              ${e.desc} - ${e.amount}
              <button onclick="deleteExpense('${d.id}')">X</button>
            `;
            list.appendChild(li);
          });

          updateFinance(total, monthly, categories);
        });
    }

    function updateFinance(total, monthly, categories) {
      totalEl.textContent = total;

      let budgetVal = parseFloat(budget.textContent) || 0;
      let balance = budgetVal - total;

      balanceStatus.textContent = balance >= 0
        ? "Remaining: " + balance
        : "Overspent: " + Math.abs(balance);

      let months = Object.keys(monthly).sort();

      if (months.length >= 2) {
        let last = monthly[months[months.length - 1]];
        let prev = monthly[months[months.length - 2]];

        monthlyChange.textContent = "Change: " + (last - prev);
      }

      drawChart(categories);
      drawMonthlyChart(monthly);
    }

    function drawChart(data) {
      if (chart) chart.destroy();
      chart = new Chart(chart, {
        type: "pie",
        data: {
          labels: Object.keys(data),
          datasets: [{ data: Object.values(data) }]
        }
      });
    }

    function drawMonthlyChart(data) {
      if (monthlyChart) monthlyChart.destroy();
      monthlyChart = new Chart(monthlyChart, {
        type: "bar",
        data: {
          labels: Object.keys(data),
          datasets: [{ data: Object.values(data) }]
        }
      });
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("Finance Report", 20, 20);
      doc.save("report.pdf");
    }

    window.onload = () => {
      setTimeout(() => {
        splash.style.display = "none";
      }, 1500);
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
  reg.update();
});
      
  </script>

</body>
                   </html>
