<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack Pro</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Charts + PDF -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ================= FINTECH UI ================= */
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input,select,button{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
}

button{
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#2563eb;}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.hidden{display:none;}

.small{font-size:13px;opacity:0.8;}

ul{padding:0;}
li{list-style:none;padding:8px;border-bottom:1px solid #374151;}

canvas{background:#0b1220;border-radius:10px;padding:10px;}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="auth" class="container">
<div class="card">
<h2>FinTrack Pro</h2>
<p class="small">Smart Finance Dashboard</p>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>
<button onclick="login()">Login</button>
</div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="container hidden">

<div class="topbar">
<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<!-- INPUT -->
<div class="grid">

<div class="card">
<h3>Add Transaction</h3>
<input id="amount" type="number" placeholder="Amount">
<select id="type">
<option>Income</option>
<option>Expense</option>
</select>
<input id="category" placeholder="Category">
<button onclick="addRecord()">Add</button>
</div>

<div class="card">
<h3>Budget</h3>
<input id="budget" type="number" placeholder="Monthly Budget">
<button onclick="setBudget()">Save</button>
<div id="budgetStatus"></div>
</div>

<div class="card">
<h3>Insights</h3>
<div id="insights"></div>
<button onclick="downloadPDF()">Export PDF</button>
</div>

</div>

<!-- LIST + CHARTS -->
<div class="grid">

<div class="card">
<h3>Transactions</h3>
<ul id="records"></ul>
</div>

<div class="card">
<h3>Daily Trend</h3>
<canvas id="dailyChart"></canvas>
</div>

<div class="card">
<h3>Category Split</h3>
<canvas id="categoryChart"></canvas>
</div>

</div>

</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig={
apiKey:"AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
authDomain:"expense-tracker-2ee7b.firebaseapp.com",
projectId:"expense-tracker-2ee7b",
storageBucket:"expense-tracker-2ee7b.firebasestorage.app",
messagingSenderId:"306376576940",
appId:"1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let uid=null;
let data=[];

/* ================= AUTH ================= */
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){auth.signOut();location.reload();}

auth.onAuthStateChanged(u=>{
if(u){
uid=u.uid;
document.getElementById('auth').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');
listen();
}
});

/* ================= FIRESTORE ================= */
function listen(){
db.collection("users").doc(uid).collection("tx")
.orderBy("date")
.onSnapshot(s=>{
data=[];
s.forEach(d=>data.push({id:d.id,...d.data()}));
render();
});
}

function addRecord(){
db.collection("users").doc(uid).collection("tx").add({
amount:+amount.value,
type:type.value,
category:category.value,
date:Date.now()
});
}

function del(id){
db.collection("users").doc(uid).collection("tx").doc(id).delete();
}

/* ================= RENDER ================= */
let chart;

function render(){

records.innerHTML=data.map(r=>`
<li>${r.type} ${r.amount} ${r.category}
<button onclick="del('${r.id}')">X</button></li>
`).join('');

let d={},c={};
let inc=0,exp=0;

data.forEach(r=>{
let day=new Date(r.date).toLocaleDateString();

if(r.type=="Income")inc+=r.amount;
else exp+=r.amount;

d[day]=(d[day]||0)+r.amount;
if(r.type=="Expense")c[r.category]=(c[r.category]||0)+r.amount;
});

insights.innerHTML=`<h3>${inc-exp} Balance</h3>`;

budgetStatus.innerHTML=`Budget: ${budget.value||0}`;

if(chart)chart.destroy();
chart=new Chart(dailyChart,{type:'line',data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]}});
new Chart(categoryChart,{type:'doughnut',data:{labels:Object.keys(c),datasets:[{data:Object.values(c)}]}});
}

/* ================= PDF ================= */
function downloadPDF(){
const {jsPDF}=window.jspdf;
let pdf=new jsPDF();
pdf.text("FinTrack Report",10,10);
pdf.save("report.pdf");
}

</script>

</body>
</html>
