<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:"Times New Roman";background:#0f172a;color:#fff;margin:0}
.container{padding:15px}
.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{background:#22c55e;color:white;font-weight:bold}
li{background:#334155;margin:5px 0;padding:8px;border-radius:6px}
canvas{margin-top:10px}
</style>
</head>

<body>

<div id="auth" class="container">
<h2>Login</h2>
<input id="email">
<input id="password" type="password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" class="container" style="display:none">

<button onclick="logout()">Logout</button>

<div class="card">
<h3>Income</h3>
<input id="incomeDesc">
<input id="incomeAmount" type="number">
<button onclick="addIncome()">Add</button>
<ul id="incomeList"></ul>
</div>

<div class="card">
<h3>Expenses</h3>
<input id="desc">
<input id="amount" type="number">
<select id="category">
<option>Rent</option><option>Food</option><option>Water</option>
<option>Electricity</option><option>WiFi</option><option>Misc</option>
</select>
<button onclick="addExpense()">Add</button>
<ul id="expenseList"></ul>
</div>

<div class="card">
<h3>Budget</h3>
<input id="budgetInput">
<button onclick="setBudget()">Save</button>
<p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Income: <span id="incomeTotal">0</span></p>
<p>Expenses: <span id="expenseTotal">0</span></p>
<p id="profit"></p>
<p id="risk"></p>
<button onclick="generatePDF()">Download PDF</button>

<canvas id="pieChart"></canvas>
<canvas id="monthlyChart"></canvas>
<canvas id="dailyChart"></canvas>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>Admin</h3>
<ul id="usersList"></ul>
</div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let pieChart, monthlyChart, dailyChart, balanceChart;

// AUTH
async function register(){
  try{
    const res = await auth.createUserWithEmailAndPassword(email.value,password.value);
    await db.collection("users").doc(res.user.uid).set({
      budget:0,
      role:"admin"
    });
  }catch(e){ alert(e.message); }
}

async function login(){
  try{
    await auth.signInWithEmailAndPassword(email.value,password.value);
  }catch(e){ alert(e.message); }
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadData();
    loadAdmin();
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// ADD
function addIncome(){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").add({
    desc:incomeDesc.value,
    amount:Number(incomeAmount.value),
    date:new Date()
  });
}

function addExpense(){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").add({
    desc:desc.value,
    amount:Number(amount.value),
    category:category.value,
    date:new Date()
  });
}

function del(type,id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection(type).doc(id).delete();
}

// DATA
function loadData(){
  const uid = auth.currentUser.uid;

  let incomeTotalVal = 0;
  let expenseTotalVal = 0;

  let monthlyIncome = {};
  let monthlyExpense = {};
  let categoryData = {};
  let dailyData = {};
  let balanceTrend = [];

  db.collection("users").doc(uid).collection("income")
  .onSnapshot(snap=>{
    incomeTotalVal = 0;
    monthlyIncome = {};
    incomeList.innerHTML = "";

    snap.forEach(d=>{
      let data = d.data();
      let date = new Date(data.date);

      incomeTotalVal += data.amount;

      let m = date.getMonth();
      monthlyIncome[m] = (monthlyIncome[m]||0)+data.amount;

      incomeList.innerHTML += `
      <li>${data.desc} - ${data.amount}
      <button onclick="del('income','${d.id}')">x</button></li>`;
    });

    incomeTotal.innerText = incomeTotalVal;
    updateDashboard();
    drawCharts();
  });

  db.collection("users").doc(uid).collection("expenses")
  .onSnapshot(snap=>{
    expenseTotalVal = 0;
    monthlyExpense = {};
    categoryData = {};
    dailyData = {};
    expenseList.innerHTML = "";

    snap.forEach(d=>{
      let e = d.data();
      let date = new Date(e.date);

      expenseTotalVal += e.amount;

      categoryData[e.category] = (categoryData[e.category]||0)+e.amount;

      let m = date.getMonth();
      monthlyExpense[m] = (monthlyExpense[m]||0)+e.amount;

      let day = date.toLocaleDateString();
      dailyData[day] = (dailyData[day]||0)+e.amount;

      expenseList.innerHTML += `
      <li>${e.desc} - ${e.amount}
      <button onclick="del('expenses','${d.id}')">x</button></li>`;
    });

    expenseTotal.innerText = expenseTotalVal;

    // BALANCE TREND
    let balance = incomeTotalVal - expenseTotalVal;
    balanceTrend.push(balance);

    updateDashboard();
    drawCharts();
  });

  function updateDashboard(){
    let inc = Number(incomeTotal.innerText)||0;
    let exp = Number(expenseTotal.innerText)||0;

    let p = inc - exp;

    profit.innerText = p>=0 ? "Profit: "+p : "Loss: "+Math.abs(p);

    let r = "LOW";
    if(exp>inc) r="HIGH";
    else if(exp>inc*0.7) r="MEDIUM";

    risk.innerText = "Risk: "+r;
  }

  function drawCharts(){

    // PIE
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById("pieChart"),{
      type:"pie",
      data:{labels:Object.keys(categoryData),datasets:[{data:Object.values(categoryData)}]}
    });

    // MONTHLY
    let months = [...new Set([...Object.keys(monthlyIncome),...Object.keys(monthlyExpense)])];

    if(monthlyChart) monthlyChart.destroy();
    monthlyChart = new Chart(document.getElementById("monthlyChart"),{
      type:"bar",
      data:{
        labels:months,
        datasets:[
          {label:"Income",data:months.map(m=>monthlyIncome[m]||0)},
          {label:"Expenses",data:months.map(m=>monthlyExpense[m]||0)}
        ]
      }
    });

    // DAILY
    if(dailyChart) dailyChart.destroy();
    dailyChart = new Chart(document.getElementById("dailyChart"),{
      type:"line",
      data:{
        labels:Object.keys(dailyData),
        datasets:[{label:"Daily Expenses",data:Object.values(dailyData)}]
      }
    });
  }
}

// ADMIN
function loadAdmin(){
  db.collection("users").doc(auth.currentUser.uid).get().then(doc=>{
    if(doc.data().role==="admin"){
      document.getElementById("adminPanel").style.display="block";

      db.collection("users").onSnapshot(snap=>{
        usersList.innerHTML="";
        snap.forEach(d=>{
          usersList.innerHTML+=`
          <li>${d.id}
          <button onclick="makeAdmin('${d.id}')">Make Admin</button></li>`;
        });
      });
    }
  });
}

function makeAdmin(uid){
  db.collection("users").doc(uid).update({role:"admin"});
}

// PDF
async function generatePDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=20;
  doc.text("Finance Report",20,y);

  const snap = await db.collection("users")
  .doc(auth.currentUser.uid)
  .collection("expenses").get();

  snap.forEach(d=>{
    let e=d.data();
    y+=10;
    doc.text(`${e.desc} - ${e.amount}`,20,y);
  });

  doc.save("report.pdf");
}

</script>
</body>
  </html>
