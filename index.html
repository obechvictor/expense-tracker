<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Banking Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:"Times New Roman";
background:#f4f7fb;
margin:0;
padding:15px;
color:#222;
}

.hidden{
display:none;
}

.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
background:#16c94c;
color:white;
padding:20px;
border-radius:16px;
margin-bottom:15px;
}

.small-btn{
width:auto;
padding:8px 18px;
border:none;
border-radius:8px;
background:white;
color:#16c94c;
font-weight:bold;
cursor:pointer;
}

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
background:#16c94c;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

.chart-container{
position:relative;
height:320px;
}

.transaction-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.del{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
width:auto;
}

.green{
color:green;
font-weight:bold;
}

.orange{
color:orange;
font-weight:bold;
}

.red{
color:red;
font-weight:bold;
}

</style>
</head>
<body>

<!-- AUTH -->

<div id="authPage">

<div class="card">

<h2>Login / Register</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

</div>

</div>

<!-- APP -->

<div id="appPage" class="hidden">

<div class="header">

<div>
<h1>Smart Banking Dashboard</h1>
</div>

<button id="editBtn" class="small-btn" onclick="toggleEdit()">
Edit
</button>

</div>

<div class="row">

<div class="card">
<h2>Income</h2>
<p id="income">KSh 0</p>
</div>

<div class="card">
<h2>Expenses</h2>
<p id="expenses">KSh 0</p>
</div>

<div class="card">
<h2>Balance</h2>
<p id="balance">KSh 0</p>
</div>

</div>

<!-- BUDGET -->

<div class="card">

<h2>Budget</h2>

<input id="budgetInput" type="number" placeholder="Monthly Budget">

<button onclick="setBudget()">Save Budget</button>

<p id="budgetStatus">No budget set</p>

</div>

<!-- TRANSACTION -->

<div class="card">

<h2>Add Transaction</h2>

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<input id="category" placeholder="Category">

<button onclick="addTransaction()">Add Transaction</button>

</div>

<!-- DAILY -->

<div class="card">

<h2>Daily Trend</h2>

<div class="chart-container">
<canvas id="dailyChart"></canvas>
</div>

</div>

<!-- MONTHLY -->

<div class="card">

<h2>Monthly Comparison</h2>

<div class="chart-container">
<canvas id="monthlyChart"></canvas>
</div>

</div>

<!-- DONUT -->

<div class="card">

<h2>Expense Breakdown</h2>

<div class="chart-container">
<canvas id="donutChart"></canvas>
</div>

</div>

<!-- INSIGHTS -->

<div class="card">

<h2>Financial Insights</h2>

<div id="insights"></div>

</div>

<!-- PDF -->

<div class="card">

<button onclick="downloadPDF()">
PDF Report
</button>

</div>

<!-- RECORDS -->

<div class="card">

<h2>Records</h2>

<div id="transactionList"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  databaseURL: "https://expense-tracker-2ee7b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409",
  measurementId: "G-V7B8WSWCZ8"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

/* VARIABLES */

let currentUser=null;

let transactions=[];

let budget=0;

let editMode=false;

let dailyChart=null;
let monthlyChart=null;
let donutChart=null;

/* REGISTER */

window.register=async()=>{

const email=
document.getElementById("email").value;

const password=
document.getElementById("password").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("Registration successful");

}catch(err){

alert(err.message);

}

};

/* LOGIN */

window.login=async()=>{

const email=
document.getElementById("email").value;

const password=
document.getElementById("password").value;

try{

const userCredential=
await signInWithEmailAndPassword(
auth,
email,
password
);

currentUser=userCredential.user;

await loadUserData();

document.getElementById("authPage")
.classList.add("hidden");

document.getElementById("appPage")
.classList.remove("hidden");

alert("Login successful");

}catch(err){

alert(err.message);

}

};

/* AUTO LOGIN */

onAuthStateChanged(auth,async(user)=>{

if(user){

currentUser=user;

document.getElementById("authPage")
.classList.add("hidden");

document.getElementById("appPage")
.classList.remove("hidden");

await loadUserData();

}else{

document.getElementById("authPage")
.classList.remove("hidden");

document.getElementById("appPage")
.classList.add("hidden");

}

});

/* SAVE */

async function saveUserData(){

if(!currentUser) return;

await setDoc(
doc(db,"users",currentUser.uid),
{
transactions:transactions,
budget:budget
}
);

}

/* LOAD */

async function loadUserData(){

if(!currentUser) return;

try{

const docRef=
doc(db,"users",currentUser.uid);

const snap=
await getDoc(docRef);

if(snap.exists()){

const data=snap.data();

transactions=
Array.isArray(data.transactions)
?
data.transactions
:
[];

budget=
Number(data.budget) || 0;

}else{

transactions=[];

budget=0;

}

console.log("Loaded Transactions:",transactions);

updateUI();

}catch(err){

console.log(err);

}

}
  
/* ADD */
async function addTransaction(){

const amount=
Number(document.getElementById("amount").value);

const type=
document.getElementById("type").value;

const category=
document.getElementById("category").value;

if(!amount || !category) return;

const tx={

amount:amount,
type:type,
category:category,
date:new Date().toISOString()

};

await addDoc(

collection(
db,
"users",
currentUser.uid,
"transactions"
),

tx

);
  
async function loadTransactions(){

transactions=[];

const q=
await getDocs(

collection(
db,
"users",
currentUser.uid,
"transactions"
)

);

q.forEach(doc=>{

transactions.push({

id:doc.id,
...doc.data()

});

});

updateUI();

}

/* BUDGET */

async function saveBudget(){

budget=
Number(
document.getElementById("budgetInput").value
);

await setDoc(

doc(db,"users",currentUser.uid),

{
budget:budget
},

{merge:true}

);

updateUI();

}

/* TOGGLE */

window.toggleEdit=()=>{

editMode=!editMode;

document.getElementById("editBtn")
.innerText=editMode?"Done":"Edit";

updateUI();

};

/* DELETE */

window.deleteGroup=async(id)=>{

transactions=
transactions.filter(t=>t.id!=id);

await saveUserData();

updateUI();

};

/* SUM */
  
function sum(type){

return transactions
.filter(t=>t.type===type)
.reduce(
(total,item)=>total+Number(item.amount),
0
);

}

/* UPDATE */

function updateUI(){

const incomeTotal=sum("income");

const expenseTotal=sum("expense");

document.getElementById("income")
.innerText="KSh "+incomeTotal;

document.getElementById("expenses")
.innerText="KSh "+expenseTotal;

document.getElementById("balance")
.innerText="KSh "+(incomeTotal-expenseTotal);

document.getElementById("budgetStatus")
.innerText=
budget
?
"Budget: KSh "+budget
:
"No budget set";

/* RECORDS */

const transactionList=
document.getElementById("transactionList");

transactionList.innerHTML="";

const grouped={};

transactions.forEach(t=>{

const key=t.type+"-"+t.category;

if(!grouped[key]){

grouped[key]={
amount:0,
ids:[]
};

}

grouped[key].amount+=t.amount;

grouped[key].ids.push(t.id);

});

Object.keys(grouped).forEach(key=>{

const parts=key.split("-");

const category=parts[1];

transactionList.innerHTML+=`

<div class="transaction-item">

<span>
${category} - KSh ${grouped[key].amount}
</span>

${editMode
?
`<button class="del"
onclick="deleteGroup('${grouped[key].ids[0]}')">
X
</button>`
:
""
}

</div>

`;

});

/* INSIGHTS */

let ratio=
budget>0
?
((expenseTotal/budget)*100).toFixed(1)
:
0;

let message="";
let cls="green";

if(ratio>100){

message="Over budget. Reduce spending.";
cls="red";

}else if(ratio>75){

message="Warning: high spending.";
cls="orange";

}else{

message="Healthy spending.";
cls="green";

}

document.getElementById("insights").innerHTML=`

<p><b>Income:</b> KSh ${incomeTotal}</p>

<p><b>Expenses:</b> KSh ${expenseTotal}</p>

<p><b>Usage:</b> ${ratio}%</p>

<p class="${cls}">${message}</p>

`;

/* DRAW */

drawCharts();

}

/* CHARTS */

function drawCharts(){

setTimeout(()=>{

/* DAILY */

const daily={};

transactions
.filter(t=>t.type==="expense")
.forEach(t=>{

const d=t.date.split("T")[0];

daily[d]=(daily[d]||0)+t.amount;

});

const dailyLabels=Object.keys(daily);

const dailyValues=Object.values(daily);

if(dailyChart) dailyChart.destroy();

dailyChart=new Chart(
document.getElementById("dailyChart"),
{
type:"line",
data:{
labels:dailyLabels,
datasets:[{
label:"Daily Expenses",
data:dailyValues,
borderColor:"#16c94c",
backgroundColor:"rgba(22,201,76,0.2)",
fill:true,
tension:0.4
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

/* MONTHLY */

if(monthlyChart) monthlyChart.destroy();

monthlyChart=new Chart(
document.getElementById("monthlyChart"),
{
type:"bar",
data:{
labels:["This Month"],
datasets:[
{
label:"Income",
data:[sum("income")],
backgroundColor:"#36a2eb"
},
{
label:"Expenses",
data:[sum("expense")],
backgroundColor:"#ff6384"
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

/* DONUT */

const cat={};

transactions
.filter(t=>t.type==="expense")
.forEach(t=>{

cat[t.category]=(cat[t.category]||0)+t.amount;

});

if(donutChart) donutChart.destroy();

donutChart=new Chart(
document.getElementById("donutChart"),
{
type:"doughnut",
data:{
labels:Object.keys(cat),
datasets:[{
data:Object.values(cat),
backgroundColor:[
"#36a2eb",
"#ff6384",
"#ffce56",
"#4bc0c0",
"#9966ff",
"#ff9f40",
"#16c94c"
]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

},300);

}

/* PDF */

window.downloadPDF=()=>{

window.print();

};

</script>

</body>
</html>
