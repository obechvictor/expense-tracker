<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===============================
   GLOBAL STYLES
================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Times New Roman";
}

body {
    background: #f4f7fb;
    color: #222;
}

/* ===============================
   AUTH SCREEN
================================ */
.auth-container {
    width: 350px;
    margin: 80px auto;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.auth-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* ===============================
   DASHBOARD
================================ */
.dashboard {
    display: none;
    padding: 20px;
}

.header {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.cards {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.card {
    flex: 1;
    min-width: 200px;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

.transactions {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

.transaction-item {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    padding: 10px;
    border-bottom: 1px solid #eee;
}
</style>
</head>
<body>

<!-- ===============================
     AUTH SECTION
================================ -->
<div class="auth-container" id="authSection">
    <h2>Expense Tracker</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<!-- ===============================
     DASHBOARD
================================ -->
<div class="dashboard" id="dashboard">

    <div class="header">
        <h2>Financial Dashboard</h2>
    </div>

    <!-- Summary Cards -->
    <div class="cards">
        <div class="card">
            <h3>Income</h3>
            <p id="income">KSh 0</p>
        </div>

        <div class="card">
            <h3>Expenses</h3>
            <p id="expenses">KSh 0</p>
        </div>

        <div class="card">
            <h3>Balance</h3>
            <p id="balance">KSh 0</p>
        </div>
    </div>

    <!-- Add Transaction -->
    <div class="chart-box">
        <h3>Add Transaction</h3>

        <input type="number" id="amount" placeholder="Amount">

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <select id="category">
            <option>Food</option>
            <option>Transport</option>
            <option>Rent</option>
            <option>Entertainment</option>
            <option>Other</option>
        </select>

        <button onclick="addTransaction()">Add</button>
    </div>

    <!-- Daily Trend Chart -->
    <div class="chart-box">
        <h3>Daily Expense Trend</h3>
        <canvas id="dailyChart"></canvas>
    </div>

    <!-- Monthly Comparison -->
    <div class="chart-box">
        <h3>Monthly Comparison</h3>
        <canvas id="monthlyChart"></canvas>
    </div>

    <!-- Transactions -->
    <div class="transactions">
        <h3>Transaction History</h3>
        <div id="transactionList"></div>
    </div>

</div>

<script>
let transactions = [];

function login() {
    document.getElementById("authSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
}

function register() {
    alert("Registration frontend ready.");
}

function addTransaction() {
    const amount = Number(document.getElementById("amount").value);
    const type = document.getElementById("type").value;
    const category = document.getElementById("category").value;

    transactions.push({ amount, type, category });

    updateDashboard();
}

function updateDashboard() {
    let income = transactions
        .filter(t => t.type === "income")
        .reduce((sum, t) => sum + t.amount, 0);

    let expenses = transactions
        .filter(t => t.type === "expense")
        .reduce((sum, t) => sum + t.amount, 0);

    document.getElementById("income").innerText = "KSh " + income;
    document.getElementById("expenses").innerText = "KSh " + expenses;
    document.getElementById("balance").innerText = "KSh " + (income - expenses);

    renderTransactions();
}

function renderTransactions() {
    const list = document.getElementById("transactionList");
    list.innerHTML = "";

    transactions.forEach(t => {
        list.innerHTML += `
            <div class="transaction-item">
                <span>${t.category}</span>
                <span>${t.type}: KSh ${t.amount}</span>
            </div>
        `;
    });
}

new Chart(document.getElementById("dailyChart"), {
    type: "line",
    data: {
        labels: ["Mon","Tue","Wed","Thu","Fri"],
        datasets: [{
            label: "Expenses",
            data: [500,700,400,900,650]
        }]
    }
});

new Chart(document.getElementById("monthlyChart"), {
    type: "bar",
    data: {
        labels: ["Jan","Feb","Mar"],
        datasets: [{
            label: "Expenses",
            data: [5000,7000,6000]
        }]
    }
});
</script>

</body>
</html>
