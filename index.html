<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance SaaS</title>

<!-- Firebase (COMPAT version) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #fff;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 6px;
}

button {
  background: #22c55e;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #334155;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="container">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">
  <button onclick="logout()">Logout</button>

  <div class="card">
    <h3>Add Expense</h3>
    <input id="desc" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <button onclick="addExpense()">Add</button>
  </div>

  <div class="card">
    <h3>Budget</h3>
    <input id="budgetInput" placeholder="Set Budget">
    <button onclick="setBudget()">Save</button>
    <p>Budget: <span id="budget">0</span></p>
  </div>

  <div class="card">
    <h3>Summary</h3>
    <p>Total: <span id="total">0</span></p>
  </div>

  <div class="card">
    <h3>Expenses</h3>
    <ul id="list"></ul>
  </div>
</div>

<script>
/* ✅ YOUR FIREBASE CONFIG (WORKING) */
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.firebasestorage.app",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409",
  measurementId: "G-V7B8WSWCZ8"
};

/* ✅ INIT FIREBASE */
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* 🔐 AUTH FUNCTIONS */
async function register(){
  try {
    if(password.value.length < 6){
      alert("Password must be at least 6 characters");
      return;
    }
    await auth.createUserWithEmailAndPassword(email.value, password.value);
    alert("Registered successfully");
  } catch(e){
    alert(e.message);
  }
}

async function login(){
  try {
    await auth.signInWithEmailAndPassword(email.value, password.value);
  } catch(e){
    alert(e.message);
  }
}

function logout(){
  auth.signOut();
}

/* 🔄 AUTH STATE */
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadData();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

/* 💰 ADD EXPENSE */
async function addExpense(){
  const user = auth.currentUser;

  await db.collection("users")
    .doc(user.uid)
    .collection("expenses")
    .add({
      desc: desc.value,
      amount: +amount.value,
      created: new Date()
    });

  desc.value = "";
  amount.value = "";
}

/* 💳 SET BUDGET */
async function setBudget(){
  const user = auth.currentUser;

  await db.collection("users")
    .doc(user.uid)
    .set({
      budget: +budgetInput.value
    }, { merge: true });
}

/* 📊 LOAD DATA */
function loadData(){
  const user = auth.currentUser;

  db.collection("users").doc(user.uid)
  .onSnapshot(doc => {
    const data = doc.data() || {};
    document.getElementById("budget").textContent = data.budget || 0;
  });

  db.collection("users").doc(user.uid)
  .collection("expenses")
  .onSnapshot(snapshot => {

    let total = 0;
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const e = doc.data();
      total += e.amount;

      const li = document.createElement("li");
      li.textContent = `${e.desc} - KES ${e.amount}`;
      list.appendChild(li);
    });

    document.getElementById("total").textContent = total;
  });
}
</script>

</body>
  </html>
