<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack Production Banking</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0b1220;--card:#111827;--text:#e5e7eb;--accent:#2563eb;
}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.card{background:var(--card);padding:15px;border-radius:14px}
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none}
button{background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<div id="auth" class="container">
<div class="card">
<h2>Production Banking Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app" class="container hidden">

<div class="card">
<h2>Bank Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="grid">
<div class="card"><h3>Balance</h3><h1 id="balance">0</h1></div>
<div class="card"><h3>Income</h3><h2 id="income">0</h2></div>
<div class="card"><h3>Expense</h3><h2 id="expense">0</h2></div>
</div>

<div class="card">
<h3>Transaction Engine</h3>
<input id="amount" type="number" placeholder="Amount">
<select id="type"><option>Income</option><option>Expense</option></select>
<input id="category" placeholder="Category">
<button onclick="createTx()">Submit Transaction</button>
</div>

<div class="grid">
<div class="card"><canvas id="daily"></canvas></div>
<div class="card"><canvas id="cat"></canvas></div>
<div class="card"><canvas id="month"></canvas></div>
</div>

<div class="card">
<h3>Ledger</h3>
<ul id="list"></ul>
</div>

</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig={
apiKey:"AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
authDomain:"expense-tracker-2ee7b.firebaseapp.com",
projectId:"expense-tracker-2ee7b",
storageBucket:"expense-tracker-2ee7b.firebasestorage.app",
messagingSenderId:"306376576940",
appId:"1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let uid=null;
let tx=[];

/* ================= SECURITY SESSION CONTROL ================= */
let sessionToken=null;

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* ================= AUTH ================= */
function showApp(){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("lock").style.display="none";
}

function showAuth(){
document.getElementById("auth").style.display="block";
document.getElementById("app").style.display="none";
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>console.log("login success"))
.catch(e=>{
alert("Login failed: " + e.message);
console.log(e);
});
}

/* REGISTER */
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Account created"))
.catch(e=>alert(e.message));
}

/* AUTH STATE */
auth.onAuthStateChanged(u=>{
if(u){
uid=u.uid;
showApp();
listen();
}else{
showAuth();
}
});
  
/* ================= FIRESTORE TRANSACTION ENGINE ================= */

function validateTx(t){
return t.amount>0 && t.category.length>1;
}

function createTx(){
let txData={
amount:+amount.value,
type:type.value,
category:category.value,
uid,
time:Date.now(),
session:sessionToken
};

if(!validateTx(txData))return alert("Invalid transaction");

return db.collection("ledger").add(txData);
}

function listen(){
db.collection("ledger")
.where("uid","==",uid)
.onSnapshot(s=>{
tx=[];
s.forEach(d=>tx.push({id:d.id,...d.data()}));
render();
});
}

/* ================= AGGREGATION ENGINE ================= */

function render(){
let inc=0,exp=0,d={},c={},m={};

list.innerHTML=tx.map(r=>{
if(r.type=="Income")inc+=r.amount;else exp+=r.amount;

let day=new Date(r.time).toDateString();
let mon=new Date(r.time).toISOString().slice(0,7);

d[day]=(d[day]||0)+r.amount;
m[mon]=(m[mon]||0)+r.amount;

if(r.type=="Expense")c[r.category]=(c[r.category]||0)+r.amount;

return `<li>${r.type} ${r.amount} ${r.category}</li>`;
}).join('');

balance.innerText=inc-exp;
income.innerText=inc;
expense.innerText=exp;

charts(d,c,m);
}

/* ================= CHART ENGINE ================= */
let a,b,c;
function charts(d,cmap,m){
if(a)a.destroy();if(b)b.destroy();if(c)c.destroy();

a=new Chart(daily,{type:'line',data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]}});

b=new Chart(cat,{type:'doughnut',data:{labels:Object.keys(cmap),datasets:[{data:Object.values(cmap)}]}});

c=new Chart(month,{type:'bar',data:{labels:Object.keys(m),datasets:[{data:Object.values(m)}]}});
}

</script>

</body>
</html>
