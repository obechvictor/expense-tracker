<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Planner</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Times New Roman';
  background:#0f172a;
  color:#fff;
  margin:0;
}
.container{padding:15px;}
.card{
  background:#1e293b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}
button{background:#22c55e;color:white;font-weight:bold;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="container">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none">

<button onclick="logout()">Logout</button>

<div class="card">
<h3>Add Income</h3>
<input id="incomeDesc" placeholder="Source">
<input id="incomeAmount" type="number">
<button onclick="addIncome()">Add Income</button>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="desc" placeholder="Description">
<input id="amount" type="number">
<select id="category">
<option>Rent</option><option>Food</option><option>Water</option>
<option>Electricity</option><option>Garbage</option>
<option>Parents</option><option>Household Items</option>
<option>Clothing</option><option>Savings</option>
<option>WiFi</option><option>Miscellaneous</option>
</select>
<button onclick="addExpense()">Add</button>
</div>

<div class="card">
<h3>Budget</h3>
<input id="budgetInput">
<button onclick="setBudget()">Save</button>
<p>Budget: <span id="budget">0</span></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Income: <span id="incomeTotal">0</span></p>
<p>Expenses: <span id="expenseTotal">0</span></p>
<p id="profit"></p>
<p id="budgetStatus"></p>
<p id="health"></p>
<canvas id="categoryChart"></canvas>
</div>

<div class="card">
<h3>Monthly Report</h3>
<p id="monthlySummary"></p>
<p id="monthlyComparison"></p>
<canvas id="monthlyChart"></canvas>
</div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b",
  storageBucket: "expense-tracker-2ee7b.appspot.com",
  messagingSenderId: "306376576940",
  appId: "1:306376576940:web:f7bf235be67524c9c8b409"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let categoryChart, monthlyChart;

// 🔴 CONTROL FLAGS (FIX)
let expLoaded = false;
let incLoaded = false;

// AUTH
async function register(){
  try{
    let u = await auth.createUserWithEmailAndPassword(email.value,password.value);

    await db.collection("users").doc(u.user.uid).set({
      email: email.value,
      role:"user",
      budget:0
    });

  }catch(e){ alert(e.message); }
}

async function login(){
  try{
    await auth.signInWithEmailAndPassword(email.value,password.value);
  }catch(e){ alert(e.message); }
}

function logout(){ auth.signOut(); }

// AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv = document.getElementById("auth");
    appDiv = document.getElementById("app");

    authDiv.style.display="none";
    appDiv.style.display="block";

    loadData();

  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// ADD
async function addExpense(){
  const u = auth.currentUser;

  await db.collection("users").doc(u.uid).collection("expenses").add({
    desc: desc.value,
    amount: parseFloat(amount.value),
    category: category.value,
    created: new Date()
  });
}
async function addIncome(){
  const u = auth.currentUser;

  if(!incomeAmount.value) return alert("Enter amount");

  await db.collection("users").doc(u.uid).collection("income").add({
    desc: incomeDesc.value || "Income",
    amount: parseFloat(incomeAmount.value),
    created: new Date()
  });

  incomeDesc.value = "";
  incomeAmount.value = "";
  }

// BUDGET
async function setBudget(){
  const u = auth.currentUser;

  await db.collection("users").doc(u.uid).set({
    budget: parseFloat(budgetInput.value)
  },{merge:true});
}

// LOAD DATA
function loadData(){

  const u = auth.currentUser;

  let exp=0, inc=0, cat={}, mExp={}, mInc={};

  // BUDGET
  db.collection("users").doc(u.uid).onSnapshot(doc=>{
    budget.textContent = doc.data().budget || 0;
  });

  // EXPENSES
db.collection("users").doc(u.uid).collection("expenses")
.onSnapshot(s=>{
  exp = 0;
  cat = {};
  mExp = {};
  list.innerHTML = "";

  s.forEach(d=>{
    let e = d.data();
    exp += e.amount;

    cat[e.category] = (cat[e.category] || 0) + e.amount;

    let k = e.created.toDate().toLocaleString('default',{month:'short',year:'numeric'});
    mExp[k] = (mExp[k] || 0) + e.amount;

    let li = document.createElement("li");
    li.innerHTML = `${e.desc} - ${e.amount}`;
    list.appendChild(li);
  });

  expLoaded = true;

  if(expLoaded && incLoaded){
    update(exp, inc, cat, mExp, mInc);
  }
});
  // INCOME
  db.collection("users").doc(u.uid).collection("income")
   .onSnapshot(s=>{
    inc = 0;
    mInc = {};

  s.forEach(d=>{
    let i = d.data();
    inc += i.amount;

    let k = i.created.toDate().toLocaleString('default',{month:'short',year:'numeric'});
    mInc[k] = (mInc[k] || 0) + i.amount;
  });

  incLoaded = true;

  if(expLoaded && incLoaded){
    update(exp, inc, cat, mExp, mInc);
  }
});

// UPDATE
function update(exp,inc,cat,mExp,mInc){

  expenseTotal.textContent = exp;
  incomeTotal.textContent = inc;

  let p = inc - exp;

  profit.textContent = p>=0 ? "Profit: "+p : "Loss: "+Math.abs(p);

  let b = parseFloat(budget.textContent)||0;
  let remain = b - exp;

  budgetStatus.textContent = remain>=0 ? "Remaining: "+remain : "Overspent: "+Math.abs(remain);

  health.textContent = inc>exp ? "Status: Healthy" : "Status: Risk";

  // MONTHLY
  let months = Object.keys(mExp);

  if(months.length){
    let cur = months[months.length-1];
    monthlySummary.textContent = "Current: "+mExp[cur];
  }

  if(months.length>=2){
    let prev = mExp[months[months.length-2]];
    let curr = mExp[months[months.length-1]];
    let growth = ((curr-prev)/prev)*100;
    monthlyComparison.textContent = "Growth: "+growth.toFixed(1)+"%";
  }

  drawCat(cat);
  drawMonth(mExp,mInc);
}

// CHARTS
function drawCat(data){
  if(categoryChart) categoryChart.destroy();

  categoryChart = new Chart(document.getElementById("categoryChart"),{
    type:"pie",
    data:{
      labels:Object.keys(data),
      datasets:[{data:Object.values(data)}]
    }
  });
}

function drawMonth(exp,inc){
  if(monthlyChart) monthlyChart.destroy();

  let labels=[...new Set([...Object.keys(exp),...Object.keys(inc)])];

  monthlyChart = new Chart(document.getElementById("monthlyChart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"Expenses",data:labels.map(l=>exp[l]||0)},
        {label:"Income",data:labels.map(l=>inc[l]||0)}
        
 // ADMIN
function loadAdmin(){
  const u=auth.currentUser;

  db.collection("users").doc(u.uid).get().then(doc=>{
    if(doc.data().role==="admin"){
      adminPanel.style.display="block";

      db.collection("users").onSnapshot(s=>{
        usersList.innerHTML="";

        s.forEach(d=>{
          let row=document.createElement("tr");
          row.innerHTML=`
            <td>${d.data().email}</td>
            <td>${d.data().role}</td>
            <td><button onclick="makeAdmin('${d.id}')">Admin</button></td>
          `;
          usersList.appendChild(row);
        });
      });
    }
    });
}

async function makeAdmin(id){
  await db.collection("users").doc(id).update({role:"admin"});
}

</script>

</body>
</html>
