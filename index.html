<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Tracker</title>
  
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:"Times New Roman";margin:0;background:#f1f5f9;}
.wrapper{max-width:1100px;margin:auto;padding:20px;}

.header{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;padding:20px;border-radius:12px;
}

.card{
  background:white;padding:20px;margin-top:15px;
  border-radius:12px;
}

.item{
  display:flex;justify-content:space-between;
  padding:10px;border-bottom:1px solid #eee;
}

.delete-btn{display:none;}
.item:hover .delete-btn{display:inline-block;}

.minus{color:red;}
.plus{color:green;}

button{padding:8px;border:none;border-radius:6px;}
input{width:100%;padding:8px;margin:5px 0;}

</style>
</head>

<body>

<div id="auth" class="wrapper">
  <h2>Login</h2>
  <input id="email">
  <input id="password" type="password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="app" style="display:none">
<div class="wrapper">

<div class="header">
  <h2>Finance Dashboard</h2>
  <button onclick="toggleEdit()" id="editBtn">Edit</button>
</div>

<div class="card">
  <h3>Add Income</h3>
  <input id="incomeAmount">
  <button onclick="addIncome()">Add</button>

  <h3>Add Expense</h3>
  <input id="expenseAmount">
  <input id="expenseCategory">
  <button onclick="addExpense()">Add</button>
</div>

<div class="card">
  <h2>Balance: KES <span id="balance">0</span></h2>
  <canvas id="lineChart"></canvas>
</div>

<div class="card">
  <h2>Expenses: KES <span id="totalExpense">0</span></h2>
  <canvas id="donutChart"></canvas>
</div>

<div class="card">
  <h3>Expenses</h3>
  <div id="records"></div>
</div>

<div class="card">
  <h3>Income</h3>
  <div id="incomeList"></div>
</div>

</div>
</div>

<script>

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let expenses=[], incomes=[], editMode=false;
let lineChart, donutChart;

// AUTH
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value);
}

auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.style.display="none";
    app.style.display="block";
    loadData();
  }
});

// ADD DATA
function addIncome(){
  let val=parseFloat(incomeAmount.value);
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").add({
    amount:val,
    date:new Date().toISOString()
  });
}

function addExpense(){
  let val = parseFloat(expenseAmount.value);
  let cat = expenseCategory.value;

  if(!val || !cat){
    alert("Fill all fields");
    return;
  }

  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").add({
    amount: val,
    category: cat,
    date: new Date().toISOString() // ✅ REQUIRED
  });
}
// LOAD DATA
function loadData(){
  let uid=auth.currentUser.uid;

  db.collection("users").doc(uid).collection("income")
  .onSnapshot(snap=>{
    incomes=[];
    snap.forEach(d=>{
      let i=d.data(); i.id=d.id;
      incomes.push(i);
    });
    updateUI();
  });

  db.collection("users").doc(uid).collection("expenses")
  .onSnapshot(snap=>{
    expenses=[];
    snap.forEach(d=>{
      let e=d.data(); e.id=d.id;
      expenses.push(e);
    });
    updateUI();
  });
}

// UPDATE UI
function updateUI(){
  let incomeTotal=incomes.reduce((a,b)=>a+b.amount,0);
  let expenseTotal=expenses.reduce((a,b)=>a+b.amount,0);

  balance.innerText=incomeTotal-expenseTotal;
  totalExpense.innerText=expenseTotal;

  renderList();
  drawCharts();
}

// LIST
function renderList(){
  records.innerHTML="";
  incomeList.innerHTML="";

  expenses.forEach(e=>{
    records.innerHTML+=`
    <div class="item">
      <div>${e.category}</div>
      <div>
        <span class="minus">-KES ${e.amount}</span>
        ${editMode?`<button onclick="deleteExpense('${e.id}')">❌</button>`:""}
      </div>
    </div>`;
  });

  incomes.forEach(i=>{
    incomeList.innerHTML+=`
    <div class="item">
      <div>Income</div>
      <div>
        <span class="plus">+KES ${i.amount}</span>
        ${editMode?`<button onclick="deleteIncome('${i.id}')">❌</button>`:""}
      </div>
    </div>`;
  });
}

// DELETE
function deleteExpense(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").doc(id).delete();
}

function deleteIncome(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").doc(id).delete();
}

// EDIT
function toggleEdit(){
  editMode=!editMode;
  renderList();
}

// CHARTS
function drawCharts(){
let daily = {};

expenses.forEach(e=>{
  if(!e.date) return; // ✅ skip broken data

  let d = e.created?.toDate ? e.created.toDate() : new Date(e.created);

  if (isNaN(d)) return; // skip bad data

  let day = d.toLocaleDateString(); // FULL DATE (correct)

daily[day] = (daily[day] || 0) + e.amount;
  
  let labels=Object.keys(daily);
  let values=Object.values(daily);

  if(lineChart) lineChart.destroy();
  lineChart=new Chart(lineChartCanvas,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Daily Expenses",
        data:values,
        fill:true
      }]
    }
  });

  // DONUT
  let cat={};
  expenses.forEach(e=>{
    cat[e.category]=(cat[e.category]||0)+e.amount;
  });

  if(donutChart) donutChart.destroy();
  donutChart=new Chart(donutChartCanvas,{
    type:"doughnut",
    data:{
      labels: Object.keys(daily).length ? Object.keys(daily) : ["No Data"],
      datasets:[{data:Object.values(cat)}]
  if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("SW registered"))
      .catch(err => console.log("SW error", err));
  });
  }
}

const authDiv=document.getElementById("auth");
const app=document.getElementById("app");

// ELEMENTS
const records=document.getElementById("records");
const incomeList=document.getElementById("incomeList");
const balance=document.getElementById("balance");
const totalExpenseEl=document.getElementById("totalExpense");
const donutCenter=document.getElementById("donutCenter");
const insight=document.getElementById("insight");
const donutChartCanvas=document.getElementById("donutChart");
const lineChartCanvas=document.getElementById("lineChart");
const editBtn=document.getElementById("editBtn");

</script>

</body>
      </html>
