<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:"Times New Roman";
  background:#f1f5f9;
}

.wrapper{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.header{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  padding:20px;
  border-radius:12px;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  margin-top:20px;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
  position:relative;
  transition:0.3s;
}

.item.swiping{background:#fee2e2;}

.delete-btn{display:none;}

.item:hover .delete-btn{display:inline-block;}

.minus{color:#ef4444;}
.plus{color:#22c55e;}

button{
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#editBtn{
  background:#0ea5e9;
  color:white;
  margin-top:10px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
}

.donut-wrap{
  position:relative;
  height:200px;
}

.center-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="wrapper">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="wrapper">

<div class="header">
  <h2>Finance Dashboard</h2>
  <button id="editBtn" onclick="toggleEdit()">Edit Mode</button>
</div>

<!-- INPUTS -->
<div class="card">
  <h3>Add Income</h3>
  <input id="incomeAmount" placeholder="Amount">
  <button onclick="addIncome()">Add Income</button>

  <h3>Add Expense</h3>
  <input id="expenseAmount" placeholder="Amount">
  <input id="expenseCategory" placeholder="Category">
  <button onclick="addExpense()">Add Expense</button>
</div>

<div class="grid">

<div>
  <div class="card">
    <h3>Balance</h3>
    <h1>KES <span id="balance">0</span></h1>
    <canvas id="lineChart"></canvas>
  </div>

  <div class="card">
    <h3>Expenses Structure</h3>
    <h2>KES <span id="totalExpense">0</span></h2>

    <div class="donut-wrap">
      <canvas id="donutChart"></canvas>
      <div class="center-text" id="donutCenter">0</div>
    </div>
  </div>
</div>

<div>
  <div class="card">
    <h3>Expenses</h3>
    <div id="records"></div>
  </div>

  <div class="card">
    <h3>Income</h3>
    <div id="incomeList"></div>
  </div>

  <div class="card">
    <h3>Insights</h3>
    <p id="insight"></p>
  </div>
</div>

</div>

</div>

</div>

<script>

// CLEAR OLD CACHE
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAZL45LCOAQxpRVYbq0P_xnplxLstnVHIA",
  authDomain: "expense-tracker-2ee7b.firebaseapp.com",
  projectId: "expense-tracker-2ee7b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let expenses=[], incomes=[], editMode=false;
let donutChart, lineChart;

// AUTH
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({});
  });
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadData();
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// ADD
function addIncome(){
  let val=parseFloat(incomeAmount.value);
  if(!val) return alert("Enter amount");

  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").add({amount:val});

  incomeAmount.value="";
}

function addExpense(){
  let val=parseFloat(expenseAmount.value);
  let cat=expenseCategory.value;

  if(!val||!cat) return alert("Fill all");

  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").add({amount:val,category:cat});

  expenseAmount.value="";
  expenseCategory.value="";
}

// DELETE
function deleteExpense(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("expenses").doc(id).delete();
}

function deleteIncome(id){
  db.collection("users").doc(auth.currentUser.uid)
  .collection("income").doc(id).delete();
}

// EDIT MODE
function toggleEdit(){
  editMode=!editMode;
  editBtn.innerText=editMode?"Done":"Edit Mode";
  renderUI();
}

// LOAD DATA
function loadData(){
  let uid=auth.currentUser.uid;

  let incomeTotal=0;

  db.collection("users").doc(uid).collection("income")
  .onSnapshot(snap=>{
    incomes=[];
    incomeTotal=0;
    snap.forEach(d=>{
      let i=d.data(); i.id=d.id;
      incomes.push(i);
      incomeTotal+=i.amount||0;
    });
    renderUI();
  });

  db.collection("users").doc(uid).collection("expenses")
  .onSnapshot(snap=>{
    expenses=[];
    let categories={};
    let dailyTotals = {};
    
    snap.forEach(d=>{
      let e = d.data(); 
      e.id = d.id;
      expenses.push(e);

      categories[e.category] = (categories[e.category] || 0) + e.amount;

      let day = new Date(e.date).toLocaleDateString();

      dailyTotals[day] = (dailyTotals[day] || 0) + e.amount;
    });
    
  db.collection("users").doc(uid)
.collection("expenses").add({
  amount: val,
  category: cat,
  date: new Date().toISOString()   // ✅ ADD THIS
    let totalExpense=expenses.reduce((a,b)=>a+b.amount,0);
    let balanceVal=incomeTotal-totalExpense;

    balance.innerText=balanceVal;
    totalExpenseEl.innerText=totalExpense;
    donutCenter.innerText=totalExpense;

    drawDonut(categories);
    drawLine(trend);

    if(balanceVal<0) insight.innerText="⚠️ Overspending";
    else if(balanceVal<5000) insight.innerText="⚠️ Low balance";
    else insight.innerText="✅ Healthy";

    renderUI();
  });
}

// RENDER UI
function renderUI(){
  records.innerHTML="";
  incomeList.innerHTML="";

  expenses.forEach(e=>{
    records.innerHTML+=`
    <div class="item"
      ontouchstart="startSwipe(event,this,'${e.id}')"
      ontouchmove="moveSwipe(event,this)"
      ontouchend="endSwipe(this,'${e.id}')">

      <div>${e.category}</div>
      <div>
        <span class="minus">-KES ${e.amount}</span>
        ${editMode?`<button class="delete-btn" onclick="deleteExpense('${e.id}')">❌</button>`:""}
      </div>
    </div>`;
  });

  incomes.forEach(i=>{
    incomeList.innerHTML+=`
    <div class="item"
      ontouchstart="startSwipe(event,this,'${i.id}',true)"
      ontouchmove="moveSwipe(event,this)"
      ontouchend="endSwipe(this,'${i.id}',true)">

      <div>Income</div>
      <div>
        <span class="plus">+KES ${i.amount}</span>
        ${editMode?`<button class="delete-btn" onclick="deleteIncome('${i.id}')">❌</button>`:""}
      </div>
    </div>`;
  });
}

// SWIPE
let startX=0;

function startSwipe(e,el){
  startX=e.touches[0].clientX;
}

function moveSwipe(e,el){
  let diff=startX-e.touches[0].clientX;
  if(diff>0){
    el.style.transform=`translateX(-${diff}px)`;
    el.classList.add("swiping");
  }
}

function endSwipe(el,id,isIncome=false){
  let moved=parseInt(el.style.transform.replace(/[^\d]/g,''))||0;

  if(moved>100){
    isIncome?deleteIncome(id):deleteExpense(id);
  }else{
    el.style.transform="translateX(0)";
    el.classList.remove("swiping");
  }
}

// CHARTS
function drawDonut(cat){
  if(donutChart) donutChart.destroy();
  donutChart=new Chart(donutChartCanvas,{
    type:"doughnut",
    data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]},
    options:{cutout:"70%"}
  });
}
function drawLine(trend){
  if(lineChart) lineChart.destroy();

  lineChart = new Chart(lineChartCanvas, {
    type: "line",
    data: {
      labels: trend.map((_, i) => "Day " + (i + 1)), // better labels
      datasets: [{
        label: "Daily Spending",   // ✅ THIS FIXES "undefined"
        data: trend,
        fill: true,
        tension: 0.4
      }]
    }
  });
 }

// ELEMENTS
const records=document.getElementById("records");
const incomeList=document.getElementById("incomeList");
const balance=document.getElementById("balance");
const totalExpenseEl=document.getElementById("totalExpense");
const donutCenter=document.getElementById("donutCenter");
const insight=document.getElementById("insight");
const donutChartCanvas=document.getElementById("donutChart");
const lineChartCanvas=document.getElementById("lineChart");
const editBtn=document.getElementById("editBtn");

</script>

</body>
  </html>
